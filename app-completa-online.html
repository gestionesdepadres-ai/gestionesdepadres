      console.log("[DIAG]", msg);
      window.diagLogs.push(msg);
      const el = document.getElementById('diagnostic-content');
      if (el) {
        el.innerHTML += '<div>' + msg.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';
        el.scrollTop = el.scrollHeight;
      }
    };
    window.addEventListener('DOMContentLoaded', () => {
      const el = document.getElementById('diagnostic-content');
      if (el) {
        el.innerHTML = window.diagLogs.map(msg => '<div>' + msg.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>').join('');

      }

      window.logDiag("ERROR: " + e.message + " at " + e.filename + ":" + e.lineno);
    });

      window.logDiag("UNHANDLED REJECTION: " + e.reason);
    });

            // Fallback if firebase not ready (shouldn't happen with await, but safety)
            const value = localStorage.getItem(key);
            value === null ? reject(new Error('Key not found')) : resolve({ value });
            return;
          }
          firebase.database().ref(key).once('value')
            .then((snapshot) => {
              const val = snapshot.val();
              // App expects { value: "stringified_json" } structure if legacy, 
              // but we are storing the stringified JSON directly as the value in DB.
              // So val will be the string string.
              if (val === null) {
                reject(new Error('Key not found'));
              } else {
                resolve({ value: val });
              }
            })
            .catch(reject);
        } catch (error) { reject(error); }
      }),
      set: async (key, value) => new Promise((resolve, reject) => {
        try {
          if (!window.firebaseApp) {
            localStorage.setItem(key, value);
            resolve();
            return;
          }
          firebase.database().ref(key).set(value)
            .then(() => resolve())
            .catch(reject);
        }
        catch (error) { reject(error); }
      })

              cutoff.setDate(cutoff.getDate() - 30);

      // Top-level Auto-Read and Email Logic (Fix for Blank Screen violation)
      useEffect(() => {

        // Apply Visibility Filters roughly for logic (exact implementation in render)
        const visibleMessages = messages.filter(m => {

          if (m.to === user.id) return true;   // Direct to me

          // Role based visibility
          if (user.role === 'admin') return true; // Admins see all? Or respect flags? Assuming flags for consistency
          if (user.role === 'cuidador') {
            // Caregivers see messages to 'caregivers' + direct
            return m.to === 'caregivers';
          } else {
            // Users see messages based on flags
            const sender = users.find(u => u.id === m.from);
            const isSenderCaregiver = sender?.role === 'cuidador';
            if (isSenderCaregiver && !user.permissions?.seeCaregiverMessages) return false;
            if (!isSenderCaregiver && !user.permissions?.seeOtherMessages) return false;

            // If it's a general message ('users' or 'caregivers'), logic applies
            if (m.to === 'users') return true;
            if (m.to === 'caregivers') return true; // Discussable
            return false;
          }
        });

        // Update unread logic to be strict about who marks as read
        const unread = visibleMessages.filter(m => {
          if (m.read) return false;
          if (m.from === user.id) return false; // Don't read my own messages

          // STRICT RULES For marking as read
          // 1. Direct message to me
          if (m.to === user.id) return true;

          // 2. Broadcast to 'todos'
          if (m.to === 'todos') return true;

          // 3. Group messages I belong to
          if (user.role === 'cuidador' && m.to === 'caregivers') return true;

          // 4. Admin Exception: Admin does NOT mark as read unless it is for everyone or specifically for them/admin
          // If I am admin and message is user->user, I see it but do NOT mark it read.
          if (user.role === 'admin') {
            if (m.to === 'admin') return true;
            // If m.to is NOT me, NOT todos, NOT admin... do not mark read.
            return false;
          }

          // 5. Default users seeing caregiver messages (if they have permission)
          // Should they mark it read? Probably yes if they saw it? 
          // Let's assume yes if they are in the target audience logic above, but here:
          if (m.to === 'caregivers' && user.permissions?.seeCaregiverMessages) return true;

          return false;
        });

        if (unread.length > 0) {
          const updatedMsgs = messages.map(m => {
            if (unread.find(u => u.id === m.id)) {
              return { ...m, read: true, readBy: user.id, readDate: new Date().toISOString() };
            }

          });

          if (JSON.stringify(updatedMsgs) !== JSON.stringify(messages)) {
            setMessages(updatedMsgs);
            saveData('messages', updatedMsgs);

            // Notify targets if Im a caregiver reading

              const targets = user.caregiverTargets || [];
              targets.forEach(targetId => {
                const targetUser = users.find(u => u.id === targetId);
                if (targetUser && targetUser.notifications?.messages) {
                  sendEmail('Mensaje Leído por Cuidador', `El cuidador ${user.id} ha leído los mensajes.`, targetUser.email);
                }

        }
      }, [messages, view, mainView, user, users, emailConfig]);

      const saveData = async (key, data) => {

          // Si guardamos usuarios, asegúrate de mantener a Ivan como admin

      // Unified Notification System
      const notifySystem = async (module, action, detail, targetUser = null) => {
        // 1. Check Global Trigger
        if (!emailConfig.triggers?.[module]) return; // Module disabled globally

        const config = emailConfig.notifications?.[module] || { mode: 'immediate' };
        const template = emailContentConfig[module] || { subject: `[Gestión Padres] ${action}`, body: 'Nueva notificación.' };

        // Determine Recipients
        // If targetUser is specific (e.g. messaging), check their preference
        let recipients = [];
        if (targetUser) {
          if (targetUser.notifications?.[module] !== false) recipients.push(targetUser.id);
        } else {
          // Broadcast: Find all users with this permission AND notification enabled, EXCLUDING SENDER (currentUser)
          // Also ensure we don't send to self even if targetUser was not passed (double check)
          const currentUserId = user ? user.id : 'SISTEMA';
          recipients = users.filter(u =>
            u.id !== currentUserId && // Exclude sender
            u.permissions?.[module] &&
            u.notifications?.[module] !== false
          ).map(u => u.id);
        }

        if (recipients.length === 0) return; // No one to notify

        // 2. Immediate Mode
        if (config.mode === 'immediate' || !config.mode) {
          const subject = template.subject;
          const body = `${template.body}\n\nDetalles: ${action} - ${detail}`;

          // Send to each recipient
          recipients.forEach(rid => {
            const rUser = users.find(u => u.id === rid);
            if (rUser && rUser.email) {
              sendEmail(subject, body, rUser.email);
            }
          });
          return;
        }

        // 3. Batched Mode
        if (config.mode === 'batched') {
          const now = new Date();
          const currentHour = now.getHours();
          const activeHours = config.activeHours || []; // e.g. [9, 14, 20]

          // Find next slot
          // Sort hours
          const sortedHours = [...activeHours].sort((a, b) => a - b);
          let nextHour = sortedHours.find(h => h > currentHour);
          let scheduledTime = new Date(now);

          if (nextHour !== undefined) {
            scheduledTime.setHours(nextHour, 0, 0, 0);
          } else {
            // Tomorrow first slot
            scheduledTime.setDate(scheduledTime.getDate() + 1);
            scheduledTime.setHours(sortedHours[0] !== undefined ? sortedHours[0] : 9, 0, 0, 0); // Default 9am if empty?
          }
          // If no active hours set, default to next hour? 
          if (activeHours.length === 0) {
            scheduledTime = new Date(now.getTime() + 1 * 60 * 60 * 1000); // 1 hour default
          }

          const event = {
            user: user ? user.id : 'SISTEMA',
            action,
            detail,
            time: getLocalDateISOString(now) + ' ' + now.toLocaleTimeString()
          };

          const updatedQueue = [...emailQueue];
          let queueItem = updatedQueue.find(q => q.module === module && q.status === 'pending');

          if (queueItem) {
            queueItem.events.push(event);
            // Update recipients list union
            const currentRecipients = queueItem.recipients || [];
            const newRecipients = [...new Set([...currentRecipients, ...recipients])];
            queueItem.recipients = newRecipients;

            // Should we update text preview? 
            queueItem.bodyPreview = `${queueItem.events.length} eventos pendientes.`;

          } else {
            // Create New Queue Item
            queueItem = {
              id: Date.now(),
              module,
              status: 'pending',
              scheduledTime: scheduledTime.toISOString(),
              events: [event],
              recipients: recipients,
              subject: template.subject,
              bodyTemplate: template.body,
              from: user ? user.id : 'SISTEMA', // Initiator of first event
              bodyPreview: `1 evento: ${action}`
            };
            updatedQueue.push(queueItem);
          }

          setEmailQueue(updatedQueue);
          saveData('emailQueue', updatedQueue);
        }
      };

      // Queue Processor
      useEffect(() => {
        const interval = setInterval(() => {
          if (emailQueue.length === 0) return;

          const now = new Date();
          const updatedQueue = emailQueue.map(q => {
            if (q.status === 'pending' && new Date(q.scheduledTime) <= now) {
              // TIME TO SEND!
              // Generate Digest
              const digest = `
${q.bodyTemplate}

RESUMEN DE CAMBIOS:
------------------------------------------------
${q.events.map(e => `[${e.time}] ${e.user}: ${e.action} - ${e.detail}`).join('\n')}
                     `;

              // Send to accumulated recipients
              if (q.recipients && q.recipients.length > 0) {
                q.recipients.forEach(rid => {
                  const rUser = users.find(u => u.id === rid);
                  if (rUser && rUser.email) {
                    sendEmail(q.subject, digest, rUser.email);
                  }
                });
              }

              return { ...q, status: 'sent', sentAt: now.toISOString() };
            }
            return q;
          });

          if (JSON.stringify(updatedQueue) !== JSON.stringify(emailQueue)) {
            // Keep sent items or delete? 
            // User wants to see them in "Pending Queue" implies existing ones?
            // Usually "Pending" means not sent. 
            // We can remove 'sent' ones to keep list clean, or existing UI filters pending.
            // Let's filter here to allow UI to show pending only, preventing infinite growth.
            // Or maybe keep last 5 sent? 
            // User requested "Cola de Emails Pendientes" UI updates. 
            // We will save all for now but the UI usually filters. 
            // Actually, previously we filtered pendingOnly. Let's stick to that to avoid storage bloat.
            const pendingOnly = updatedQueue.filter(q => q.status === 'pending');
            // Check if any status changed to 'sent' -> we essentially delete them from queue.
            // If user wants history, we'd need another store. Assuming Queue = Pending.
            setEmailQueue(pendingOnly);
            saveData('emailQueue', pendingOnly);
          }

        }, 60000); // Check every minute
        return () => clearInterval(interval);
      }, [emailQueue, emailConfig, users]);

      const sendEmail = async (subject, message, toEmail = null) => {

          console.log('Email no configurado');

        // [FIX] Add redundant keys for compatibility with various EmailJS template configurations
        const templateParams = {

          to_email: toEmail,

        };

        try {
          await emailjs.send(emailConfig.serviceId, emailConfig.templateId, templateParams, emailConfig.publicKey);
          console.log('Email enviado correctamente');

          // Log success
          setSentEmailLog(prev => {
            const newLog = {

        } catch (error) {

          // [FIX] Log failure to system log so admin can see it
          setSentEmailLog(prev => {

              id: Date.now(),

              subject: subject,

              status: 'failed',

            };
            const updated = [newLog, ...prev].slice(0, 100);
            saveData('sentEmailLog', updated);

          });

          alert(`Error enviando email: ${error.text || 'Error desconocido'}`);

      const handleLogin = () => {

        }
      };

      const getLocalDateISOString = (date) => {
        const d = new Date(date);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      };

      const getMondayOfWeek = (date) => {
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
      };

      const getWeekDates = (weekStart) => {
        const dates = [];
        const monday = getMondayOfWeek(new Date(weekStart));
        for (let i = 0; i < 7; i++) {
          const date = new Date(monday);
          date.setDate(monday.getDate() + i);
          dates.push(getLocalDateISOString(date));
        }
        return dates;
      };

      const getCurrentWeekStart = () => {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const monday = getMondayOfWeek(today);
        return getLocalDateISOString(monday);
      };

      const getAssignedUser = (weekStart) => {
        const assignment = weekAssignments.find(a => a.weekStart === weekStart);
        return assignment ? assignment.user : null;
      };

      const getWeeksAround = () => {
        const current = getCurrentWeekStart();
        const currentDate = new Date(current);
        const weeks = { current: [], past: [], future: [] };
        const threeMonthsFromNow = new Date();
        threeMonthsFromNow.setMonth(threeMonthsFromNow.getMonth() + 3);

        const firstWeekStart = new Date('2024-01-01');

        for (let i = -52; i <= 13; i++) {
          const weekDate = new Date(currentDate);
          weekDate.setDate(currentDate.getDate() + (i * 7));

          if (weekDate < firstWeekStart) continue;
          if (i > 0 && weekDate > threeMonthsFromNow) continue;

          const monday = getMondayOfWeek(weekDate);
          const weekStart = getLocalDateISOString(monday);
          const sunday = new Date(monday);
          sunday.setDate(monday.getDate() + 6);

          const assigned = getAssignedUser(weekStart);
          const menu = menus.find(m => m.weekStart === weekStart);
          const isFinished = menu ? menu.finished : false;

          const week = {
            start: weekStart,
            end: getLocalDateISOString(sunday),
            label: `${monday.getDate().toString().padStart(2, '0')}/${(monday.getMonth() + 1).toString().padStart(2, '0')}/${monday.getFullYear()} - ${sunday.getDate().toString().padStart(2, '0')}/${(sunday.getMonth() + 1).toString().padStart(2, '0')}/${sunday.getFullYear()}`,
            assigned,
            finished: isFinished
          };

          if (i === 0) weeks.current.push(week);
          else if (i < 0) weeks.past.push(week);
          else weeks.future.push(week);
        }

        weeks.past.reverse();
        return weeks;
      };

        const updatedMenus = [...menus];

          return;

        };

        setCurrentWeek(updatedMenus[menuIndex]);

      };

      const saveAppointment = () => {
        if (!newAppointment.date || !newAppointment.time || !newAppointment.title) {
          alert('Completa fecha, hora y asunto');
          return;
        }
        const updated = [...appointments, {
          ...newAppointment,
          id: Date.now(),
          createdBy: user.id,
          target: newAppointment.target || (appointmentTargets.find(t => t.active)?.name || 'Papa') // Default to first active
        }];
        setAppointments(updated);
        saveData('appointments', updated);

        notifySystem('appointments', 'Nueva Cita', `[${newAppointment.target || 'Papa'}] ${newAppointment.date} ${newAppointment.time} - ${newAppointment.title}`);

        // Force view to the date of the new appointment
        if (newAppointment.date) {
          const [y, m, d] = newAppointment.date.split('-').map(Number);
          setSelectedDate(new Date(y, m - 1, d)); // Month is 0-indexed in Date constructor
          if (appointmentView === 'week') {
            // optional: ensure week view covers it, but selectedDate update usually handles mostly
          }
        }

        setNewAppointment({ date: '', time: '', title: '', companion: '', target: '' });
        setShowNewAppointment(false);
      };

      const updateAppointment = (id, field, value) => {
        const updated = appointments.map(a =>
          a.id === id ? { ...a, [field]: value } : a
        );
        setAppointments(updated);
        saveData('appointments', updated);
      };

      const deleteAppointment = (id, createdBy) => {
        if (user.id !== createdBy && !user.isAdmin) {
          alert('No tienes permiso');
          return;
        }
        const appointmentToDelete = appointments.find(a => a.id === id);
        const updated = appointments.map(a =>
          a.id === id ? { ...a, deleted: true, deletedBy: user.id, deletedDate: new Date().toISOString() } : a
        );
        setAppointments(updated);
        saveData('appointments', updated);

        if (appointmentToDelete) {
          sendEmail('Cita Eliminada', `
                 La cita "${appointmentToDelete.title}" del ${appointmentToDelete.date} a las ${appointmentToDelete.time} ha sido eliminada por ${user.id.toUpperCase()}.
             `);
        }
      };

      const permanentlyDeleteAppointment = (id) => {
        if (!user.isAdmin) return;
        if (!confirm('¿Eliminar DEFINITIVAMENTE esta cita del historial?')) return;
        const updated = appointments.filter(a => a.id !== id);
        setAppointments(updated);
        saveData('appointments', updated);
      };

      const getAppointmentsForDate = (date) => {
        try {
          if (!Array.isArray(appointments)) return [];
          const dateStr = typeof date === 'string' ? date : getLocalDateISOString(date);
          return appointments.filter(a => a && a.date === dateStr && !a.deleted).sort((a, b) => (a.time || '').localeCompare(b.time || ''));
        } catch (e) {
          console.error('Error getting appointments for date', e);
          return [];
        }
      };

      const getPastAppointments = () => {
        try {
          if (!Array.isArray(appointments)) return [];
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const todayStr = getLocalDateISOString(today);
          return appointments.filter(a => !a.deleted && a.date < todayStr).sort((a, b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time));
        } catch (e) { return []; }
      };

      const getDeletedAppointments = () => {
        try {
          if (!Array.isArray(appointments)) return [];
          return appointments.filter(a => a.deleted).sort((a, b) => new Date(b.deletedDate) - new Date(a.deletedDate));
        } catch (e) { return []; }
      };

      const getAppointmentsForWeek = (weekStart) => {
        try {
          let dates = getWeekDates(weekStart);
          // GUARANTEE 7 DAYS even if helper fails
          if (!dates || !Array.isArray(dates) || dates.length !== 7) {
            const start = new Date(weekStart);
            dates = Array.from({ length: 7 }, (_, i) => {
              const d = new Date(start);
              d.setDate(d.getDate() + i);
              return getLocalDateISOString(d);
            });
          }
          return dates.map((date, idx) => ({
            date,
            day: days[idx] || 'DÍA',
            appointments: getAppointmentsForDate(date)
          }));
        } catch (e) {
          console.error('Error getting appointments for week', e);
          // Return empty structure instead of crashing
          return Array.from({ length: 7 }, (_, i) => ({
            date: `Error-${i}`, day: days[i] || 'DÍA', appointments: []
          }));
        }
      };

      const handleSlotInteraction = (weekStart, dayIndex, mealType, slotIndex) => {
        const menuIndex = menus.findIndex(m => m.weekStart === weekStart);
        if (menuIndex === -1) return;

        const updatedMenus = [...menus];
        const dayMeals = updatedMenus[menuIndex].days[dayIndex].meals;
        const currentSlots = dayMeals[mealType].slots || [null, null, null];

        const targetSlot = currentSlots[slotIndex];

        // Case 1: Occupied by current user -> REMOVE
        if (targetSlot && targetSlot.user === user.id) {
          if (window.confirm('¿Liberar tu reserva?')) {
            currentSlots[slotIndex] = null;
            dayMeals[mealType].slots = currentSlots;
            setMenus(updatedMenus);
            saveData('menus', updatedMenus);
            logAction('CANCELAR_RESERVA', `${user.id} liberó hueco ${slotIndex + 1} del día ${days[dayIndex]}`);
          }
          return;
        }

        // Case 2: Occupied by other -> BLOCK
        if (targetSlot && targetSlot.user !== user.id) {
          alert(`Espacio reservado por ${targetSlot.user.toUpperCase()}`);
          return;
        }

        // Case 3: Empty -> RESERVE with Validations
        if (!targetSlot) {
          // Validation: Sequential Order "1 then 2 then 3"
          if (slotIndex > 0 && !currentSlots[slotIndex - 1]) {
            alert('Por favor, ocupa los huecos en orden (1, luego 2, luego 3).');
            return;
          }

          // Reserve
          // Prompt for Note? "si está vacio se rellena el 1 solo" 
          // Assuming auto-fill for speed as per user tone.
          // Adding optional note trigger if they hold? No, keep simple.
          const note = prompt('Nota (Opcional):') || '';
          currentSlots[slotIndex] = { user: user.id, note };
          dayMeals[mealType].slots = currentSlots;
          setMenus(updatedMenus);
          saveData('menus', updatedMenus);
          logAction('RESERVA', `${user.id} reservó hueco ${slotIndex + 1} del día ${days[dayIndex]}`);
        }
      };


      const getAppointmentsForMonth = (year, month) => {
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const daysInMonth = [];

        for (let d = new Date(firstDay); d <= lastDay; d.setDate(d.getDate() + 1)) {
          const dateStr = getLocalDateISOString(d);
          const dayAppointments = getAppointmentsForDate(dateStr);
          if (dayAppointments.length > 0) {
            daysInMonth.push({ date: dateStr, appointments: dayAppointments });
          }
        }
        return daysInMonth;
      };

      const addShoppingItem = () => {
        if (!newShoppingItem.trim()) return;
        const updated = [...shopping, {
          id: Date.now(),
          item: newShoppingItem,
          buyerType: newShoppingType,
          createdBy: user.id,
          purchased: false
        }];
        setShopping(updated);
        saveData('shopping', updated);

        // Batched Notification
        notifySystem('shopping', 'Nuevo Item Compra', `${newShoppingItem} (${newShoppingType === 'anyone' ? 'Cualquiera' : 'Solo Yo'})`);

        setNewShoppingItem('');
      };

      const purchaseItem = (id) => {
        const updated = shopping.map(s =>
          s.id === id ? { ...s, purchased: true, purchasedBy: user.id, purchasedDate: new Date().toISOString() } : s
        );
        setShopping(updated);
        saveData('shopping', updated);
      };

      const deleteShoppingItem = (id, createdBy) => {
        if (user.id !== createdBy && !user.isAdmin) {
          alert('No tienes permiso');
          return;
        }
        // Fixed: Actually delete instead of marking purchased
        const updated = shopping.filter(s => s.id !== id);
        setShopping(updated);
        saveData('shopping', updated);
      };

      const addInventoryItem = () => {
        if (!newInventoryItem.name.trim()) return;
        const newItem = {
          id: Date.now(),
          ...newInventoryItem,
          type: inventoryTab,
          date: new Date().toISOString(),
          createdBy: user.id,
          lastModified: new Date().toISOString(),
          lastModifiedBy: user.id
        };
        const updated = [newItem, ...inventory];
        setInventory(updated);
        saveData('inventory', updated);
        setNewInventoryItem({ ...newInventoryItem, name: '' }); // Keep qty/unit or reset? Resetting name is key.
      };

      const updateInventoryItem = (id, field, value) => {
        const updated = inventory.map(item =>
          item.id === id ? { ...item, [field]: value, lastModified: new Date().toISOString(), lastModifiedBy: user.id } : item
        );
        setInventory(updated);
        saveData('inventory', updated);
      };

      const deleteInventoryItem = (id) => {
        if (!confirm('¿Seguro que quieres eliminar este artículo?')) return;

        // Soft Delete Logic
        const updated = inventory.map(item =>
          item.id === id ? {
            ...item,
            deleted: true,
            deletedBy: user.id,
            deletedDate: new Date().toISOString()
          } : item
        );
        setInventory(updated);
        saveData('inventory', updated);
      };

      const permanentlyDeleteInventoryItem = (id) => {
        if (!user.isAdmin) return;
        if (!confirm('¿Borrar definitivamente del historial?')) return;
        const updated = inventory.filter(i => i.id !== id);
        setInventory(updated);
        saveData('inventory', updated);
      };


      // State for pending task inputs (Append Only logic)
      const [pendingTaskInputs, setPendingTaskInputs] = useState({});

      const handleTaskInputChange = (weekStart, dayIdx, type, value) => {
        const key = `${weekStart}-${dayIdx}-${type}`;
        setPendingTaskInputs(prev => ({ ...prev, [key]: value }));
      };

      // Modified updateTask: No longer modifies global state directly for content edits.
      // Deprecated/Unused for content now, but could be kept for meta-data if needed.
      const updateTask = (weekStart, dayIdx, type, content) => {
        // Placeholder if we need to trigger other updates
      };

      const updateHistoryLine = (weekStart, dayIdx, type, lineIdx, newValue) => {
        let newTasks = [...tasks];
        let weekIdx = newTasks.findIndex(w => w.weekStart === weekStart);
        if (weekIdx === -1) return;

        const currentContent = newTasks[weekIdx].days[dayIdx][type] || '';
        const lines = currentContent.split('\n');
        lines[lineIdx] = newValue;

        newTasks[weekIdx].days[dayIdx][type] = lines.join('\n');
        // Don't save to storage yet, waiting for 'Guardar' button
        setTasks(newTasks);
      };

      const handleManualSaveTasks = () => {
        let newTasks = [...tasks];
        const weekStart = getLocalDateISOString(getMondayOfWeek(currentTaskDate));
        let weekIdx = newTasks.findIndex(w => w.weekStart === weekStart);

        if (weekIdx === -1) {
          newTasks.push({ weekStart, days: Array(7).fill({}) });
          weekIdx = newTasks.length - 1;
        }
        if (!newTasks[weekIdx].days) newTasks[weekIdx].days = Array(7).fill({});

        const days = newTasks[weekIdx].days;
        const updatedDays = days.map((d, dayIdx) => {
          const newDay = { ...(d || {}) };
          ['morning', 'afternoon'].forEach(slot => {
            const key = `${weekStart}-${dayIdx}-${slot}`;
            const pendingText = pendingTaskInputs[key];

            if (pendingText && pendingText.trim()) {
              const existing = newDay[slot] || '';
              // Append with newline if existing text
              // Ensure signature is added to NEW text
              const signature = `(${user.id.toUpperCase()})`;
              const newContent = `${pendingText.trim()} ${signature}`;

              newDay[slot] = existing ? `${existing}\n${newContent}` : newContent;

              newDay.lastModified = new Date().toISOString();
              newDay.lastModifiedBy = user.id;
            }
          });
          return newDay;
        });

        newTasks[weekIdx].days = updatedDays;
        setTasks(newTasks);
        saveData('tasks', newTasks);
        setPendingTaskInputs({}); // Clear pending inputs
        alert('¡Tareas guardadas y firmadas!');
      };

      if (!dataLoaded) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">

              <div className="flex items-center justify-center gap-2 text-indigo-600 font-medium">
                <svg className="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                </svg>
                <span>Cargando datos...</span>
              </div>
            </div>
          </div>
        );

      if (mainView === 'login') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">

              <div className="text-center mb-8">

                <h1 className="text-3xl font-bold text-gray-800">Gestiones de Padres</h1>
              </div>

                  <label className="block text-sm font-medium text-gray-700 mb-2">Usuario</label>
                  <input
                    type="text"
                    className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                    value={loginId}
                    onChange={(e) => setLoginId(e.target.value)}
                    placeholder="ivan, gloria, raquel"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>

                    value={loginPw}
                    onChange={(e) => setLoginPw(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                  />
                </div>
                <button
                  onClick={handleLogin}
                  className="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700"
                >
                  Entrar
                </button>
                <button
                  onClick={handleForgotPassword}
                  className="w-full text-indigo-600 text-sm mt-2 hover:underline"
                >
                  ¿Olvidaste tu contraseña?
                </button>
              </div>

              <style>{`
            @media print {
              @page {
                size: A4 landscape;

                margin-bottom: 0 !important;
              }

                width: 100%; 
                height: 100vh;
                display: flex;
                flex-direction: column;
              }
            }
          `}</style>
            </div>
          </div>
        );

      if (mainView === 'main' && view === 'main') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">

              <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                <div className="flex justify-between items-center">
                  <div>
                    <h1 className="text-3xl font-bold text-gray-800">Gestiones de Padres</h1>
                    <p className="text-gray-600">Bienvenido, {user.id.toUpperCase()}</p>
                  </div>
                  <button
                    onClick={() => { setUser(null); setMainView('login'); }}
                    className="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700"
                  >
                    Salir
                  </button>
                </div>
              </div>

              <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                {user.permissions?.menus && (
                  <button
                    onClick={() => {
                      setView('menus');
                      setCurrentWeek(initializeMenu(getCurrentWeekStart()));
                    }}
                    className="bg-white rounded-xl shadow-lg p-8 hover:shadow-xl transition"
                  >
                    <ChefHat className="mx-auto mb-4 text-green-600" size={64} />
                    <h2 className="text-2xl font-bold text-center">Gestor de Menús</h2>
                  </button>
                )}

                {user.permissions?.appointments && (
                  <button
                    onClick={() => {
                      setView('appointments');
                      setAppointmentView('upcoming'); // Reset to upcoming or week as preferred
                    }}
                    className="bg-white rounded-xl shadow-lg p-8 hover:shadow-xl transition"
                  >
                    <Calendar className="mx-auto mb-4 text-blue-600" size={64} />
                    <h2 className="text-2xl font-bold text-center">Gestión de Citas</h2>
                  </button>
                )}

                {user.permissions?.shopping && (
                  <button
                    onClick={() => setView('shopping')}
                    className="bg-white rounded-xl shadow-lg p-8 hover:shadow-xl transition"
                  >
                    <ShoppingCart className="mx-auto mb-4 text-orange-600" size={64} />
                    <h2 className="text-2xl font-bold text-center">Carro de la Compra</h2>
                  </button>
                )}

                <button
                  onClick={() => setView('inventory')}
                  className="bg-white rounded-xl shadow-lg p-8 hover:shadow-xl transition relative"
                >
                  <div className="mx-auto mb-4 text-cyan-600 flex justify-center"><Package size={64} /></div>
                  <h2 className="text-2xl font-bold text-center">Nevera y Congelador</h2>
                </button>

                <button
                  onClick={() => {
                    setView('tasks');
                    setCurrentTaskDate(new Date()); // Reset to today
                  }}
                  className="bg-white rounded-xl shadow-lg p-8 hover:shadow-xl transition relative"
                >
                  <div className="mx-auto mb-4 text-gray-600 flex justify-center"><Clipboard size={64} /></div>
                  <h2 className="text-2xl font-bold text-center">Registro de Tareas</h2>
                </button>

                {user.permissions?.messages && (
                  <button
                    onClick={() => setView('messages')}
                    className="bg-white rounded-xl shadow-lg p-8 hover:shadow-xl transition relative"
                  >
                    <div className="absolute top-4 right-4">
                      {messages.filter(m => !m.read && m.to === user.id).length > 0 && (
                        <span className="flex h-6 w-6 items-center justify-center rounded-full bg-red-600 text-xs text-white">
                          {messages.filter(m => !m.read && m.to === user.id).length}
                        </span>
                      )}
                    </div>
                    <MessageSquare className="mx-auto mb-4 text-purple-600" size={64} />
                    <h2 className="text-2xl font-bold text-center">Comunicación</h2>
                  </button>
                )}
              </div>

              <div className="mt-8 bg-white rounded-xl shadow p-6">
                <h3 className="font-bold text-xl flex items-center gap-2 mb-4 text-blue-800">
                  <Calendar size={24} /> Citas de la Semana Actual
                </h3>
                <div className="space-y-3">
                  {(() => {
                    const start = getLocalDateISOString(getMondayOfWeek(new Date()));
                    const weekApps = getAppointmentsForWeek(start);
                    const hasApps = weekApps.some(d => d.appointments.length > 0);

                    if (!hasApps) return <p className="text-gray-500 italic">No hay citas para esta semana.</p>;

                    return weekApps.map(dayInfo => {
                      if (dayInfo.appointments.length === 0) return null;
                      const dateObj = new Date(dayInfo.date);
                      return (
                        <div key={dayInfo.date} className="bg-blue-50 border border-blue-100 rounded p-3">
                          <div className="font-bold text-blue-900 mb-1">{dayInfo.day} - {dateObj.getDate()}/{dateObj.getMonth() + 1}</div>
                          {dayInfo.appointments.map(app => (
                            <div key={app.id} className="bg-white p-2 rounded shadow-sm text-sm mb-1 last:mb-0 flex justify-between">
                              <span><strong>{app.time}</strong> - {app.title} ({app.companion})</span>
                              <span className="text-xs text-gray-500">({app.createdBy.toUpperCase()})</span>
                            </div>
                          ))}
                        </div>
                      );
                    });
                  })()}
                </div>
              </div>

              <div className="mt-8 bg-white rounded-xl shadow p-4">
                <h3 className="font-bold flex items-center gap-2 mb-2"><Bell size={20} /> Mis Notificaciones por Email</h3>
                <div className="flex flex-wrap gap-4 text-sm text-gray-700">
                  <p className="w-full text-xs text-gray-500 mb-2">Desmarca las que no quieras recibir (solo afecta a tu email):</p>
                  {['menus', 'appointments', 'shopping', 'messages'].map(type => (
                    user.permissions?.[type] && (
                      <label key={type} className="flex items-center gap-2 cursor-pointer bg-gray-50 px-3 py-2 rounded border">
                        <input
                          type="checkbox"
                          checked={user.notifications?.[type] ?? true}
                          onChange={(e) => {
                            const newNotifs = { ...user.notifications, [type]: e.target.checked };
                            const updatedUser = { ...user, notifications: newNotifs };
                            // Update local state and storage
                            setUser(updatedUser);
                            const allUsers = users.map(u => u.id === user.id ? updatedUser : u);
                            setUsers(allUsers);
                            saveData('users', allUsers); // Saves to global storage logic
                          }}
                        />
                        {type === 'menus' ? 'Menús' : type === 'appointments' ? 'Citas' : type === 'shopping' ? 'Compra' : 'Mensajes'}
                      </label>
                    )

              {user.isAdmin && (
                <div className="mt-6">
                  <button

                  >
                    <Users size={20} />

        const weeks = getWeeksAround();
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-7xl mx-auto">
              <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                <button
                  onClick={() => setView('main')}
                  className="flex items-center gap-2 px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600"
                >
                  <ArrowLeft size={20} /> Volver
                </button>
                <h1 className="text-3xl font-bold text-gray-800 mt-4">Gestor de Menús</h1>
                <p className="text-sm text-gray-600 mt-2">
                  Fecha actual: {currentDate.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                  <span className="ml-2 text-xs text-gray-400 no-print">(Ref: {getCurrentWeekStart()} | D: {new Date().getDay()} | BF)</span>
                </p>
              </div>

              <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                <h2 className="text-xl font-bold mb-4">Semana Actual</h2>
                {weeks.current.map(week => {
                  const bgColor = week.finished ? 'bg-green-100' : week.assigned ? 'bg-yellow-100' : 'bg-gray-100';
                  return (
                    <button
                      key={week.start}
                      onClick={() => { setCurrentWeek(initializeMenu(week.start)); setView('viewWeek'); setEditMode(false); }}
                      className={`w-full p-3 ${bgColor} hover:opacity-80 rounded-lg text-left font-medium`}

                  <div className="space-y-2 max-h-96 overflow-y-auto">
                    {weeks.future.map(week => {
                      const bgColor = week.finished ? 'bg-green-100' : week.assigned ? 'bg-yellow-100' : 'bg-gray-100';
                      return (
                        <button
                          key={week.start}
                          onClick={() => { setCurrentWeek(initializeMenu(week.start)); setView('viewWeek'); setEditMode(false); }}
                          className={`w-full p-3 ${bgColor} hover:opacity-80 rounded-lg text-left`}
                        >
                          {week.label} {week.assigned && `(${week.assigned.toUpperCase()})`}
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6">
                  <h2 className="text-xl font-bold mb-4">Semanas Anteriores</h2>
                  <div className="space-y-2 max-h-96 overflow-y-auto">
                    {weeks.past.map(week => {
                      const bgColor = week.finished ? 'bg-green-100' : week.assigned ? 'bg-yellow-100' : 'bg-gray-100';
                      return (
                        <button
                          key={week.start}
                          onClick={() => { setCurrentWeek(initializeMenu(week.start)); setView('viewWeek'); setEditMode(false); }}
                          className={`w-full p-3 ${bgColor} hover:opacity-80 rounded-lg text-left`}
                        >
                          {week.label} {week.assigned && `(${week.assigned.toUpperCase()})`}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (view === 'viewWeek' && currentWeek && mainView === 'main') {
        const canEdit = canUserEdit(currentWeek.weekStart);

        const changeWeek = (offset) => {
          const current = new Date(currentWeek.weekStart);
          current.setDate(current.getDate() + (offset * 7));
          const newWeekStart = getLocalDateISOString(current);
          setCurrentWeek(initializeMenu(newWeekStart));
        };

        const importMenu = () => {
          if (currentWeek.weekStart <= getCurrentWeekStart()) {
            alert('Solo se pueden importar menús en semanas futuras.');
            return;
          }
          if (!importTargetWeek) return;

          const sourceMenu = menus.find(m => m.weekStart === importTargetWeek);
          if (!sourceMenu) {
            alert('No se encontró menú para esa semana.');
            return;
          }

          if (!confirm(`¿Sobrescribir el menú actual con los datos de la semana seleccionada?`)) return;

          const updatedMenus = [...menus];
          const menuIndex = updatedMenus.findIndex(m => m.weekStart === currentWeek.weekStart);

          // Deep copy days/meals from source but keep local dates/days
          const newDays = updatedMenus[menuIndex].days.map((day, idx) => ({
            ...day,
            meals: JSON.parse(JSON.stringify(sourceMenu.days[idx].meals)) // Deep copy structure
          }));

          updatedMenus[menuIndex].days = newDays;
          setMenus(updatedMenus);
          saveData('menus', updatedMenus);
          setCurrentWeek(updatedMenus[menuIndex]);
          setShowImportModal(false);
          alert('Menú importado correctamente.');
        };

        const clearMenu = () => {
          if (currentWeek.weekStart <= getCurrentWeekStart()) {
            alert('Solo se puede borrar contenido de semanas futuras.');
            return;
          }
          if (!confirm('¿Estás seguro de dejar TODO el menú en blanco?')) return;

          const updatedMenus = [...menus];
          const menuIndex = updatedMenus.findIndex(m => m.weekStart === currentWeek.weekStart);

          const newDays = updatedMenus[menuIndex].days.map(day => ({
            ...day,
            meals: {
              COMIDA: { menu: '', prepara: '', sirve: '' },
              CENA: { menu: '', prepara: '', sirve: '', slots: [null, null, null] }
            }
          }));

          updatedMenus[menuIndex].days = newDays;
          setMenus(updatedMenus);
          saveData('menus', updatedMenus);
          setCurrentWeek(updatedMenus[menuIndex]);
          alert('Contenido borrado.');
        };

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-7xl mx-auto bg-white rounded-lg shadow-lg p-6 relative">

              {/* RESERVATION MODAL */}
              {showReservationModal && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                  <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm">
                    <h3 className="text-xl font-bold mb-4">
                      {reservationData.currentSlot ? 'Gestionar Reserva' : 'Reservar Espacio'}
                    </h3>

                    {reservationData.currentSlot ? (
                      <div className="mb-6">
                        <p className="mb-2">Reservado por: <strong>{reservationData.currentSlot.user.toUpperCase()}</strong></p>
                        <p className="italic text-gray-600">"{reservationData.currentSlot.note}"</p>

                        {(user.isAdmin || user.id === reservationData.currentSlot.user) && (
                          <button
                            onClick={() => {
                              // Delete single slot logic inline or helper
                              const updatedMenus = [...menus];
                              const menuIndex = updatedMenus.findIndex(m => m.weekStart === currentWeek.weekStart);
                              const dIdx = parseInt(reservationData.dayIdx);
                              const sIdx = parseInt(reservationData.slotIdx);
                              if (menuIndex > -1) {
                                const dayMeals = updatedMenus[menuIndex].days[dIdx].meals;
                                const newSlots = [...(dayMeals[reservationData.mealType].slots || [null, null, null])];
                                newSlots[sIdx] = null;
                                dayMeals[reservationData.mealType].slots = newSlots;
                                setMenus(updatedMenus);
                                saveData('menus', updatedMenus);
                                setCurrentWeek(updatedMenus[menuIndex]);
                                logAction('BORRAR_RESERVA', `${user.id} borró reserva hueco ${sIdx + 1} del día ${dIdx}`);
                              }
                              setShowReservationModal(false);
                            }}
                            className="mt-4 w-full bg-red-600 text-white py-2 rounded hover:bg-red-700"
                          >
                            Borrar Reserva
                          </button>
                        )}
                      </div>
                    ) : (
                      <>
                        <div className="mb-4">
                          <label className="block mb-2 font-medium">Nota (Opcional):</label>
                          <input
                            type="text"
                            className="w-full border p-2 rounded"
                            placeholder="Ej: No estaré, Llego tarde..."
                            value={reservationData.note}
                            onChange={(e) => setReservationData({ ...reservationData, note: e.target.value })}
                          />
                        </div>
                        <div className="flex justify-end gap-3">
                          <button
                            onClick={() => setShowReservationModal(false)}
                            className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded"
                          >
                            Cancelar
                          </button>
                          <button
                            onClick={handleReserve}
                            className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold"
                          >
                            Confirmar
                          </button>
                        </div>
                      </>
                    )}

                    {!reservationData.currentSlot && (
                      <div className="mt-4 text-xs text-center text-gray-400">
                        Reservando para: {reservationData.mealType} - Hueco {parseInt(reservationData.slotIdx) + 1}
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* IMPORT MODAL */}
              {showImportModal && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                  <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm">
                    <h3 className="text-xl font-bold mb-4 text-purple-800">Importar Menú</h3>
                    <p className="text-sm text-gray-600 mb-4">
                      Selecciona la semana de la que quieres copiar el menú.
                      <br />
                      <span className="text-red-500 font-bold block mt-2">⚠️ Esto sobrescribirá el menú actual.</span>
                    </p>

                    <div className="mb-4">
                      <label className="block mb-2 font-medium">Semana Origen:</label>
                      <select
                        className="w-full border p-2 rounded"
                        value={importTargetWeek}
                        onChange={(e) => setImportTargetWeek(e.target.value)}
                      >
                        <option value="">-- Seleccionar Semana --</option>
                        {menus
                          .filter(m => m.weekStart !== currentWeek.weekStart)
                          .sort((a, b) => b.weekStart.localeCompare(a.weekStart))
                          .map(m => {
                            const d = new Date(m.weekStart);
                            const label = d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
                            return <option key={m.weekStart} value={m.weekStart}>Semana del {label}</option>;
                          })
                        }
                      </select>
                    </div>

                    <div className="flex justify-end gap-3">
                      <button
                        onClick={() => setShowImportModal(false)}
                        className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded"
                      >
                        Cancelar
                      </button>
                      <button
                        onClick={importMenu}
                        disabled={!importTargetWeek}
                        className="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 font-bold disabled:opacity-50"
                      >
                        Importar
                      </button>
                    </div>
                  </div>
                </div>
              )}
              {/* END IMPORT MODAL */}
              <div className="mb-4 flex gap-2 no-print flex-wrap items-center justify-between">
                <div className="flex gap-2 items-center">
                  <button
                    onClick={() => { setView('menus'); setEditMode(false); }}
                    className="flex items-center gap-2 px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600"
                    title="Volver al calendario"
                  >
                    <ArrowLeft size={20} /> Volver
                  </button>
                  <button onClick={() => changeWeek(-1)} className="bg-gray-200 text-gray-800 p-2 rounded hover:bg-gray-300" title="Semana Anterior">
                    <ChevronLeft size={20} />
                  </button>
                  <button onClick={() => changeWeek(1)} className="bg-gray-200 text-gray-800 p-2 rounded hover:bg-gray-300" title="Semana Siguiente">
                    <ChevronRight size={20} />
                  </button>
                  <span className="font-bold text-gray-700 ml-2 hidden sm:inline">
                    {new Date(currentWeek.weekStart).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' })}
                  </span>
                </div>

                <div className="flex gap-2 flex-wrap justify-end">
                  {canEdit && currentWeek.weekStart > getCurrentWeekStart() && (
                    <>
                      <button onClick={() => setShowImportModal(true)} className="bg-purple-100 text-purple-700 px-3 py-1 rounded hover:bg-purple-200 text-sm font-semibold border border-purple-300 flex items-center gap-1">
                        <span className="text-lg">📥</span> Importar
                      </button>
                      <button onClick={clearMenu} className="bg-red-100 text-red-700 px-3 py-1 rounded hover:bg-red-200 text-sm font-semibold border border-red-300 flex items-center gap-1">
                        <span className="text-lg">🗑</span> Borrar
                      </button>
                    </>
                  )}

                  {canEdit && !editMode && (
                    <button
                      onClick={() => setEditMode(true)}
                      className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                    >
                      <Edit size={20} /> Editar
                    </button>
                  )}

                  {canEdit && (
                    <button
                      onClick={deleteReservations}
                      className="flex items-center gap-2 px-4 py-2 bg-red-100 text-red-700 border border-red-300 rounded hover:bg-red-200"
                    >
                      <Trash2 size={16} /> Borrar Reservados
                    </button>
                  )}

                  {canEdit && (
                    <button
                      onClick={() => toggleMenuFinish(currentWeek.weekStart)}
                      className={`flex items-center gap-2 px-4 py-2 rounded text-white font-bold shadow-md ${currentWeek.finished ? 'bg-orange-500 hover:bg-orange-600' : 'bg-green-600 hover:bg-green-700'}`}
                    >
                      {currentWeek.finished ? '🔓 Reabrir Menú' : '✅ Menú Terminado'}
                    </button>
                  )}
                </div>

                {editMode && (
                  <div className="flex gap-2 items-center ml-auto">
                    <button
                      onClick={() => setTextFormat({ ...textFormat, bold: !textFormat.bold })}
                      className={`px-3 py-2 rounded ${textFormat.bold ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
                      title="Negrita"
                    >
                      <strong>B</strong>
                    </button>
                    <button
                      onClick={() => setTextFormat({ ...textFormat, align: 'left' })}
                      className={`px-3 py-2 rounded ${textFormat.align === 'left' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
                      title="Alinear izquierda"
                    >
                      ⬅
                    </button>
                    <button
                      onClick={() => setTextFormat({ ...textFormat, align: 'center' })}
                      className={`px-3 py-2 rounded ${textFormat.align === 'center' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
                      title="Centrar"
                    >
                      ⬌
                    </button>
                    <div className="flex items-center gap-2">
                      <input
                        type="checkbox"
                        checked={selectAllMenu}
                        onChange={(e) => setSelectAllMenu(e.target.checked)}
                        className="w-4 h-4"
                        title="Aplicar formato a TODA la semana"
                      />
                      <span className="text-xs font-bold">TODO</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <label className="text-sm">Tamaño:</label>
                      <input
                        type="number"
                        min="8"
                        max="30"
                        value={textFormat.fontSize}
                        onChange={(e) => setTextFormat({ ...textFormat, fontSize: parseInt(e.target.value) })}
                        className="w-16 px-2 py-1 border rounded"
                      />
                    </div>
                    <button
                      onClick={() => {
                        // Apply GLOBAL FORMATTING if selected
                        if (selectAllMenu) {
                          // Update ALL cells in current week with this format implies changing their content to wrapped HTML?
                          // NO, the user wants "Global Setting". We are using textFormat state which IS global for view.
                          // BUT the 'bold' toggle is visual. 
                          // If 'Select All' is checked, we don't need logic changes if textFormat is already applied to all renderers.
                          // Wait, the renderer uses textFormat state directly. So it IS global already.
                          // The user probably thinks they need to select everything. 
                          // Adding the checkbox as specialized "Select All" that maybe forces persistence?
                          // Actually the user said "with it selected, change size globally". 
                          // Since 'textFormat' is global state, changing it ALREADY changes it globally for the view session.
                          // So the "Select All" might be redundant logic-wise but good for UX confirmation.
                          // Only thing: `max="30"` updated above.
                        }
                        saveMenuChanges(currentWeek.weekStart);
                        setEditMode(false);
                      }}
                      className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700"
                    >
                      <Save size={20} /> Guardar
                    </button>
                  </div>
                )}

                <button
                  onClick={() => window.print()}
                  className="flex items-center gap-2 px-4 py-2 bg-orange-600 text-white rounded hover:bg-orange-700"
                >
                  <Printer size={20} /> Imprimir
                </button>
              </div>

              {/* Header removed from here to be placed inside sections for split printing */}

              {/* RENDER GRID LOGIC REPEATED FOR 2 SECTIONS (L-X, J-D) */}
              {[
                { title: "Lunes a Miércoles", indices: [0, 1, 2] },
                { title: "Jueves a Domingo", indices: [3, 4, 5, 6] }
              ].map((section, sIdx) => {
                const startDate = new Date(currentWeek.days[0].date);
                const endDate = new Date(currentWeek.days[6].date);

                return (
                  <div key={sIdx} className="mb-8 keep-together" style={{ pageBreakAfter: sIdx === 0 ? 'always' : 'auto' }}>

                    {/* CUSTOM HEADER LOGIC PER PAGE */}
                    <div className="mb-4 border-b-4 border-gray-800 pb-2">
                      {sIdx === 0 ? (
                        <div className="text-right flex flex-col">
                          <h1 className="text-4xl font-bold uppercase">MENÚ SEMANA DEL:</h1>
                          {/* Spacer to match height of Page 2 line for alignment */}
                          <div className="mt-2 invisible">
                            <span className="text-3xl font-bold uppercase">SPACER</span>
                          </div>
                        </div>
                      ) : (
                        <div className="flex flex-col">
                          {/* Row 1: Start Date Left */}
                          <div className="text-left w-full">
                            <h2 className="text-4xl font-bold uppercase">
                              {startDate.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' })}
                            </h2>
                          </div>
                          {/* Row 2: AL + End Date Left (formerly Right) */}
                          <div className="text-left w-full mt-2">
                            <span className="text-3xl font-bold uppercase">AL {endDate.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</span>
                          </div>
                        </div>
                      )}
                    </div>

                    <h3 className="text-lg font-bold mb-3 no-print">{section.title}</h3>
                    <div className="overflow-x-auto">
                      <div className="grid gap-1 text-xs min-w-[900px]" style={{ gridTemplateColumns: `auto repeat(${section.indices.length}, 1fr)` }}>
                        <div className="bg-gray-800 text-white p-2 font-bold"></div>
                        {section.indices.map(idx => {
                          const dateObj = new Date(currentWeek.days[idx].date);
                          return (
                            <div key={idx} className="bg-gray-800 text-white p-2 font-bold text-center" style={{ fontSize: `${menuHeaderPixelSize}px` }}>
                              <div>{days[idx]}</div>
                              <div style={{ fontSize: `${Math.max(10, menuHeaderPixelSize - 2)}px` }}>{dateObj.getDate()}/{dateObj.getMonth() + 1}</div>
                            </div>
                          );
                        })}

                        {mealTypes.map(mealType => (
                          <React.Fragment key={mealType}>
                            <div className="bg-gray-200 border-2 border-gray-800 p-2 font-bold flex items-center justify-center">
                              {mealType}
                            </div>
                            {section.indices.map(dayIdx => {
                              return (
                                <div key={dayIdx} className="border-2 border-gray-800 p-2 relative">
                                  <div className="mb-2 relative z-0">
                                    {editMode ? (
                                      <textarea
                                        className="w-full text-xs border rounded p-1 resize-y"
                                        style={{
                                          minHeight: `${menuCellHeight}px`,
                                          fontSize: `${textFormat.fontSize}px`,
                                          fontWeight: textFormat.bold ? 'bold' : 'normal',
                                          textAlign: textFormat.align
                                        }}
                                        value={getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'menu')}
                                        onChange={(e) => updateMenu(currentWeek.weekStart, dayIdx, mealType, 'menu', e.target.value)}
                                      />
                                    ) : (
                                      <div style={{ minHeight: `${menuCellHeight}px`, fontSize: `${textFormat.fontSize}px`, fontWeight: textFormat.bold ? 'bold' : 'normal', textAlign: textFormat.align }} className="whitespace-pre-wrap">
                                        {canViewMenuContent(currentWeek) ? (getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'menu') || '-') :
                                          <div className="flex items-center justify-center h-full text-gray-400 font-bold italic bg-gray-50 text-xs">
                                            MENU EN EDICIÓN
                                          </div>
                                        }
                                      </div>
                                    )}
                                  </div>
                                  <div className="grid grid-cols-2 gap-1 relative z-20">
                                    <div>
                                      <div className="font-semibold" style={{ fontSize: `${menuHeaderPixelSize}px` }}>PREPARA:</div>
                                      {editMode ? (
                                        <select
                                          className={`w-full border rounded p-0.5 ${colors[getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'prepara') || '']}`}
                                          style={{ fontSize: `${menuHeaderPixelSize}px` }}
                                          value={getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'prepara')}
                                          onChange={(e) => updateMenu(currentWeek.weekStart, dayIdx, mealType, 'prepara', e.target.value)}
                                        >
                                          {people.map(p => (
                                            <option key={p} value={p}>{p.toUpperCase() || '-'}</option>
                                          ))}
                                        </select>
                                      ) : (
                                        <div
                                          className={`text-center rounded p-0.5 ${colors[getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'prepara') || '']}`}
                                          style={{ fontSize: `${menuHeaderPixelSize}px` }}
                                        >
                                          {canViewMenuContent(currentWeek) ?
                                            (getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'prepara') ? getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'prepara').toUpperCase() : '-')
                                            : '-'}
                                        </div>
                                      )}
                                    </div>
                                    <div>
                                      <div className="font-semibold" style={{ fontSize: `${menuHeaderPixelSize}px` }}>SIRVE:</div>
                                      {editMode ? (
                                        <select
                                          className={`w-full border rounded p-0.5 ${colors[getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'sirve') || '']}`}
                                          style={{ fontSize: `${menuHeaderPixelSize}px` }}
                                          value={getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'sirve')}
                                          onChange={(e) => updateMenu(currentWeek.weekStart, dayIdx, mealType, 'sirve', e.target.value)}
                                        >
                                          {people.map(p => (
                                            <option key={p} value={p}>{p.toUpperCase() || '-'}</option>
                                          ))}
                                        </select>
                                      ) : (
                                        <div
                                          className={`text-center rounded p-0.5 ${colors[getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'sirve') || '']}`}
                                          style={{ fontSize: `${menuHeaderPixelSize}px` }}
                                        >
                                          {canViewMenuContent(currentWeek) ?
                                            (getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'sirve') ? getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'sirve').toUpperCase() : '-')
                                            : '-'}
                                        </div>
                                      )}

                                      {/* SLOT SYSTEM */}
                                      <div className="flex gap-1 justify-center mt-1">
                                        {[0, 1, 2].map(slotIdx => {
                                          const slots = getMenuValue(currentWeek.weekStart, dayIdx, mealType, 'slots') || [null, null, null];
                                          const slot = slots[slotIdx];

                                          let btnClass = "w-6 h-6 flex items-center justify-center rounded border text-xs font-bold transition-colors ";

                                          if (!slot) {
                                            btnClass += "bg-white border-gray-300 text-gray-300 hover:border-gray-400 hover:text-gray-400";
                                          } else if (slot.user === user.id) {
                                            btnClass += "bg-green-100 border-green-300 text-green-700 hover:bg-green-200 hover:border-red-300 hover:text-red-600"; // Hover to delete?
                                          } else {
                                            // Occupied by other
                                            // const slotUser = users.find(u => u.id === slot.user); // Unused
                                            btnClass += (colors[slot.user] || "bg-gray-200 text-gray-600") + " opacity-80 cursor-not-allowed";
                                          }

                                          return (
                                            <button
                                              key={slotIdx}
                                              onClick={() => handleSlotInteraction(currentWeek.weekStart, dayIdx, mealType, slotIdx)}
                                              className={btnClass}
                                              title={slot ? `${slot.user.toUpperCase()}: ${slot.note || ''}` : 'Disponible'}
                                            >
                                              {slotIdx + 1}
                                            </button>
                                          );
                                        })}
                                      </div>
                                    </div> {/* End Meal Block */}
                                  </div>
                                </div>
                              );
                            })}
                          </React.Fragment>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <style>{`
                  .keep-together {
                      page-break-inside: avoid;
                  }
              `}</style>
          </div>
        );
      }

      if (view === 'appointments' && mainView === 'main') {
        const year = selectedDate.getFullYear();
        const month = selectedDate.getMonth();
        const currentWeekStart = getLocalDateISOString(getMondayOfWeek(selectedDate));
        const weekData = getAppointmentsForWeek(currentWeekStart);

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-6xl mx-auto">
              <div className="bg-white rounded-xl shadow-lg p-6">
                <button
                  onClick={() => setView('main')}
                  className="flex items-center gap-2 px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 mb-4"
                >
                  <ArrowLeft size={20} /> Volver
                </button>
                <h1 className="text-3xl font-bold text-gray-800 mb-6">Gestión de Citas</h1>

                <div className="flex gap-4 mb-6 flex-wrap">
                  <button
                    onClick={() => setAppointmentView('day')}
                    className={`px-4 py-2 rounded-lg ${appointmentView === 'day' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
                  >
                    Día
                  </button>
                  <button
                    onClick={() => setAppointmentView('week')}
                    className={`px-4 py-2 rounded-lg ${appointmentView === 'week' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
                  >
                    Semana
                  </button>
                  <button
                    onClick={() => setAppointmentView('month')}
                    className={`px-4 py-2 rounded-lg ${appointmentView === 'month' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
                  >
                    Mes
                  </button>
                  <button
                    onClick={() => setAppointmentView('text')}
                    className={`px-4 py-2 rounded-lg ${appointmentView === 'text' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
                  >
                    Texto
                  </button>
                  <button
                    onClick={() => setShowNewAppointment(!showNewAppointment)}
                    className="ml-auto flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"
                  >
                    <Plus size={20} /> {showNewAppointment ? 'Cancelar' : 'Nueva Cita'}
                  </button>
                </div>

                {showNewAppointment && (
                  <div className="mb-6 p-4 bg-green-50 rounded-lg border-2 border-green-200">
                    <h3 className="font-bold text-lg mb-4">Nueva Cita</h3>
                    <div className="mb-4">
                      <label className="block font-medium mb-1">Para:</label>
                      <select
                        className="w-full px-3 py-2 border rounded-lg bg-white"
                        value={newAppointment.target || ''}
                        onChange={(e) => setNewAppointment({ ...newAppointment, target: e.target.value })}
                      >
                        {appointmentTargets.filter(t => t.active).map(t => (
                          <option key={t.id} value={t.name}>{t.name}</option>
                        ))}
                      </select>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block font-medium mb-1">Fecha:</label>
                        <input
                          type="date"
                          className="w-full px-3 py-2 border rounded-lg"
                          value={newAppointment.date}
                          onChange={(e) => setNewAppointment({ ...newAppointment, date: e.target.value })}
                        />
                      </div>
                      <div>
                        <label className="block font-medium mb-1">Hora:</label>
                        <input
                          type="time"
                          step="300"
                          className="w-full px-3 py-2 border rounded-lg"
                          value={newAppointment.time}
                          onChange={(e) => setNewAppointment({ ...newAppointment, time: e.target.value })}
                        />
                      </div>
                      <div>
                        <label className="block font-medium mb-1">Asunto:</label>
                        <input
                          type="text"
                          className="w-full px-3 py-2 border rounded-lg"
                          value={newAppointment.title}
                          onChange={(e) => setNewAppointment({ ...newAppointment, title: e.target.value })}
