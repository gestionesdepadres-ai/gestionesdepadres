                                  if (newEmail !== null) {
                                    const updated = users.map(user => user.id === u.id ? { ...user, email: newEmail } : user);
                                    setUsers(updated);
                                    saveData('users', updated);
                                  }
                                }}
                                className="text-green-600 mr-2 text-sm block"
                              >
                                Email
                              </button>
                              {u.id !== user.id && u.id !== 'ivan' && (
                                <button
                                  onClick={() => {
                                    if (confirm('¿Borrar usuario ' + u.id + '?')) {
                                      const updated = users.filter(user => user.id !== u.id);
                                      setUsers(updated);
                                      saveData('users', updated);
                                    }
                                  }}
                                  className="text-red-600 text-sm block"
                                >
                                  Borrar
                                </button>
                              )}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <div className="p-3 border-t bg-white">
                      <button
                        onClick={() => {
                          const id = prompt('Nombre del nuevo usuario:');
                          if (id) {
                            if (users.find(u => u.id === id)) { alert('El usuario ya existe'); return; }
                            const pw = prompt('Contraseña:');
                            if (pw) {
                              const newUser = {
                                id: id.toLowerCase(),
                                password: pw,
                                email: '',
                                role: 'user',
                                isAdmin: false,
                                permissions: { menus: true, appointments: true, shopping: true, messages: true },
                                notifications: { menus: true, appointments: true, shopping: true, messages: true },
                                caregiverTargets: []
                              };
                              const updated = [...users, newUser];
                              setUsers(updated);
                              saveData('users', updated);
                            }
                          }
                        }}
                        className="text-sm bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700"
                      >
                        + Nuevo Usuario
                      </button>
                    </div>
                  </div>
                </div>

              </div>



              <div className="mb-8 border-t pt-6">
                <h3 className="font-bold text-gray-700 mb-4">Configuración de Destinatarios de Citas</h3>
                <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                  <div className="space-y-2 mb-4">
                    {appointmentTargets.map((target, idx) => (
                      <div key={target.id} className="flex items-center gap-3 bg-white p-2 rounded shadow-sm">
                        <input
                          type="checkbox"
                          checked={target.active}
                          onChange={(e) => {
                            const newTargets = [...appointmentTargets];
                            newTargets[idx].active = e.target.checked;
                            setAppointmentTargets(newTargets);
                          }}
                          className="h-5 w-5 text-blue-600 rounded"
                        />
                        <input
                          type="text"
                          value={target.name}
                          onChange={(e) => {
                            const newTargets = [...appointmentTargets];
                            newTargets[idx].name = e.target.value;
                            setAppointmentTargets(newTargets);
                          }}
                          className="border rounded px-2 py-1 text-sm flex-1"
                        />
                        <button
                          onClick={() => {
                            if (!confirm('¿Borrar destinatario?')) return;
                            const newTargets = appointmentTargets.filter(t => t.id !== target.id);
                            setAppointmentTargets(newTargets);
                          }}
                          className="text-red-500 hover:bg-red-50 p-1 rounded"
                        >
                          <Trash2 size={16} />
                        </button>
                      </div>
                    ))}
                  </div>
                  <button
                    onClick={() => {
                      const newId = `target_${Date.now()}`;
                      setAppointmentTargets([...appointmentTargets, { id: newId, name: 'Nuevo', active: true }]);
                    }}
                    className="text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded hover:bg-blue-200 font-bold"
                  >
                    + Añadir Destinatario
                  </button>
                </div>
              </div>

              <div className="border border-gray-200 rounded p-4 mb-8">
                <h3 className="font-bold mb-4">Configuración de Notificaciones (Email)</h3>

                {/* Global Triggers & Modes */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                  {['menus', 'shopping', 'appointments', 'caregivers', 'messages'].map(module => {
                    const config = emailConfig.notifications?.[module] || { mode: 'immediate' };
                    const template = emailContentConfig[module] || { subject: '', body: '' };
                    const activeHours = config.activeHours || [];

                    const toggleHour = (h) => {
                      const current = config.activeHours || [];
                      const updated = current.includes(h) ? current.filter(x => x !== h) : [...current, h];
                      const newNotif = { ...emailConfig.notifications, [module]: { ...config, activeHours: updated } };
                      const newConfig = { ...emailConfig, notifications: newNotif };
                      setEmailConfig(newConfig);
                      saveData('emailConfig', newConfig);
                    };

                    return (
                      <div key={module} className="border p-4 rounded bg-gray-50 mb-4 shadow-sm">
                        <div className="flex justify-between items-center mb-3">
                          <h4 className="font-bold capitalize text-lg text-blue-800">
                            {module === 'menus' ? 'Menús' : module === 'shopping' ? 'Compras' : module === 'appointments' ? 'Citas' : module === 'caregivers' ? 'Cuidadores' : 'Mensajes'}
                          </h4>
                          <label className="flex items-center gap-2 text-sm font-semibold">
                            <input
                              type="checkbox"
                              checked={emailConfig.triggers?.[module] ?? false}
                              onChange={(e) => {
                                const newTriggers = { ...emailConfig.triggers, [module]: e.target.checked };
                                const newConfig = { ...emailConfig, triggers: newTriggers };
                                setEmailConfig(newConfig);
                                saveData('emailConfig', newConfig);
                              }}
                              className="h-4 w-4"
                            />
                            Activar Notificaciones
                          </label>
                        </div>

                        {emailConfig.triggers?.[module] && (
                          <div className="flex flex-col gap-4 pl-4 border-l-4 border-blue-200">

                            {/* Mode Selection */}
                            <div className="flex items-center gap-4">
                              <span className="text-sm font-medium">Modo de Envío:</span>
                              <select
                                className="border rounded p-1 text-sm bg-white"
                                value={config.mode}
                                onChange={(e) => {
                                  const newNotif = { ...emailConfig.notifications, [module]: { ...config, mode: e.target.value } };
                                  const newConfig = { ...emailConfig, notifications: newNotif };
                                  setEmailConfig(newConfig);
                                  saveData('emailConfig', newConfig);
                                }}
                              >
                                <option value="immediate">Inmediato (Tiempo Real)</option>
                                <option value="batched">Agrupado (Por Horas)</option>
                              </select>
                            </div>

                            {/* Hourly Slots for Batched */}
                            {config.mode === 'batched' && (
                              <div className="bg-white p-3 rounded border">
                                <span className="text-sm font-bold block mb-2">Horas de Envío (Agrupado):</span>
                                <div className="grid grid-cols-6 sm:grid-cols-12 gap-1">
                                  {[...Array(24)].map((_, i) => (
                                    <button
                                      key={i}
                                      onClick={() => toggleHour(i)}
                                      className={`text-xs p-1 rounded border ${activeHours.includes(i) ? 'bg-blue-600 text-white border-blue-600' : 'bg-gray-50 text-gray-500 hover:bg-gray-100'}`}
                                    >
                                      {i}:00
                                    </button>
                                  ))}
                                </div>
                                <p className="text-xs text-gray-500 mt-1">
                                  * Se enviará un solo email agrupado en la siguiente hora marcada activa.
                                </p>
                              </div>
                            )}

                            {/* Template Config */}
                            <div className="mt-2">
                              <span className="text-sm font-bold block mb-1">Plantilla del Email:</span>
                              <div className="grid grid-cols-1 gap-2">
                                <input
                                  type="text"
                                  placeholder="Asunto del Correo"
                                  className="border rounded p-2 text-sm w-full"
                                  value={template.subject}
                                  onChange={(e) => {
                                    const newTemplates = { ...emailContentConfig, [module]: { ...template, subject: e.target.value } };
                                    setEmailContentConfig(newTemplates);
                                    saveData('emailContentConfig', newTemplates);
                                  }}
                                />
                                <div className="text-xs text-gray-400 text-right">Editado por: {user.id}</div>

                                <textarea
                                  placeholder="Cuerpo del mensaje (cabecera fija)"
                                  className="border rounded p-2 text-sm w-full h-20"
                                  value={template.body}
                                  onChange={(e) => {
                                    const newTemplates = { ...emailContentConfig, [module]: { ...template, body: e.target.value } };
                                    setEmailContentConfig(newTemplates);
                                    saveData('emailContentConfig', newTemplates);
                                  }}
                                />
                              </div>
                            </div>

                          </div>
                        )}
                      </div>
                    );
                  })}

                  {/* Caregiver specific manual toggle */}
                  <div className="border p-3 rounded bg-gray-50">
                    <h4 className="font-bold mb-2">Cuidadores</h4>
                    <label className="flex items-center gap-2">
                      <input
                        type="checkbox"
                        checked={emailConfig.triggers?.caregiver ?? false}
                        onChange={(e) => {
                          const newTriggers = { ...emailConfig.triggers, caregiver: e.target.checked };
                          const newConfig = { ...emailConfig, triggers: newTriggers };
                          setEmailConfig(newConfig);
                          saveData('emailConfig', newConfig);
                        }}
                      />
                      Notificar Lectura/Envio
                    </label>
                  </div>
                </div>

                <div className="mb-4">
                  <label className="block text-sm font-medium mb-1">Service ID</label>
                  <input
                    type="text"
                    className="w-full border rounded p-2"
                    value={emailConfig.serviceId || ''}
                    onChange={(e) => {
                      const newConfig = { ...emailConfig, serviceId: e.target.value };
                      setEmailConfig(newConfig);
                      saveData('emailConfig', newConfig);
                    }}
                  />
                </div>
                <div className="mb-4">
                  <label className="block text-sm font-medium mb-1">Template ID</label>
                  <input
                    type="text"
                    className="w-full border rounded p-2"
                    value={emailConfig.templateId || ''}
                    onChange={(e) => {
                      const newConfig = { ...emailConfig, templateId: e.target.value };
                      setEmailConfig(newConfig);
                      saveData('emailConfig', newConfig);
                    }}
                  />
                </div>
                <div className="mb-4">
                  <label className="block text-sm font-medium mb-1">Public Key</label>
                  <input
                    type="password"
                    className="w-full border rounded p-2"
                    value={emailConfig.publicKey || ''}
                    onChange={(e) => {
                      const newConfig = { ...emailConfig, publicKey: e.target.value };
                      setEmailConfig(newConfig);
                      saveData('emailConfig', newConfig);
                    }}
                  />
                </div>
                <div className="mb-4">
                  <label className="block text-sm font-medium mb-1">Días de Retención de Mensajes</label>
                  <input
                    type="number"
                    className="w-full border rounded p-2"
                    value={emailConfig.retentionDays || 30}
                    onChange={(e) => {
                      const newConfig = { ...emailConfig, retentionDays: parseInt(e.target.value) };
                      setEmailConfig(newConfig);
                      saveData('emailConfig', newConfig);
                    }}
                  />
                </div>
              </div>

              {/* EMAIL QUEUE ADMIN SECTION */}
              <div className="mt-8 bg-orange-50 border border-orange-200 rounded p-4 mb-4">
                <h3 className="font-bold text-orange-800 mb-4 flex items-center gap-2">
                  <span className="text-xl">⏳</span> Cola de Emails Pendientes
                </h3>

                {emailQueue.filter(q => q.status === 'pending').length === 0 ? (
                  <p className="text-gray-500 italic">No hay emails pendientes de envío.</p>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full bg-white rounded shadow-sm text-sm">
                      <thead className="bg-orange-100">
                        <tr>
                          <th className="p-2 text-left">Módulo</th>
                          <th className="p-2 text-left">Programado Para</th>
                          <th className="p-2 text-left">Remitente</th>
                          <th className="p-2 text-left">Destinatarios</th>
                          <th className="p-2 text-left">Asunto</th>
                          <th className="p-2 text-left">Cuerpo / Eventos</th>
                          <th className="p-2 text-center">Acciones</th>
                        </tr>
                      </thead>
                      <tbody>
                        {emailQueue.filter(q => q.status === 'pending').map(q => (
                          <tr key={q.id} className="border-t">
                            <td className="p-2 font-medium capitalize">{q.module}</td>
                            <td className="p-2">
                              {new Date(q.scheduledTime).toLocaleTimeString()}
                              <span className="text-xs text-gray-500 block">{new Date(q.scheduledTime).toLocaleDateString()}</span>
                            </td>

                            <td className="p-2 text-sm">{q.from || 'SISTEMA'}</td>
                            <td className="p-2 text-sm text-gray-600">
                              {(q.recipients || []).map(r => {
                                const u = users.find(usr => usr.id === r);
                                return u ? `${u.id.toUpperCase()} (${u.email || 'SIN EMAIL'})` : r;
                              }).join(', ')}
                            </td>
                            <td className="p-2 font-medium text-sm">{q.subject}</td>
                            <td className="p-2">
                              <div className="text-xs text-gray-700 max-h-24 overflow-y-auto">
                                {/* Use bodyTemplate or fallback to events list */}
                                {q.bodyTemplate ? (
                                  <div>
                                    <div className="font-semibold mb-1 text-gray-900">Plantilla: {q.bodyTemplate.substring(0, 30)}...</div>
                                    {q.events.map((e, i) => (
                                      <div key={i} className="pl-2 border-l-2 border-orange-200 mb-1">
                                        <span className="font-bold">{e.user}</span>: {e.detail}
                                      </div>
                                    ))}
                                  </div>
                                ) : (
                                  q.events.map((e, i) => <div key={i}>{e.user}: {e.action}</div>)
                                )}
                              </div>
                            </td>
                            <td className="p-2 text-center">
                              <button
                                onClick={() => {
                                  const updated = emailQueue.filter(item => item.id !== q.id);
                                  setEmailQueue(updated);
                                  saveData('emailQueue', updated);
                                }}
                                className="bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200"
                              >
                                🗑 Borrar
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

            </div>
            {/* SENT EMAILS LOG SECTION */}
            <div className="mt-8 bg-green-50 border border-green-200 rounded p-4 mb-4">
              <h3 className="font-bold text-green-800 mb-4 flex items-center gap-2">
                <span className="text-xl">📨</span> Registro de Emails Enviados
              </h3>
              <div className="overflow-x-auto">
                <table className="w-full bg-white rounded shadow-sm text-sm">
                  <thead className="bg-green-100">
                    <tr>
                      <th className="p-2 text-left">Fecha</th>
                      <th className="p-2 text-left">Destinatario</th>
                      <th className="p-2 text-left">Asunto</th>
                      <th className="p-2 text-left">Estado</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[...sentEmailLog].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).map(log => (
                      <tr key={log.id} className="border-t">
                        <td className="p-2 whitespace-nowrap">{new Date(log.timestamp).toLocaleString()}</td>
                        <td className="p-2">{log.to || 'N/A'}</td>
                        <td className="p-2 font-medium">{log.subject}</td>
                        <td className="p-2 text-green-600 font-bold">{log.status}</td>
                      </tr>
                    ))}
                    {sentEmailLog.length === 0 && (
                      <tr><td colSpan="4" className="p-4 text-center text-gray-500 italic">No hay registros de envío.</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
              {/* SENT EMAILS LOG SECTION */}
              <div className="mt-8 bg-green-50 border border-green-200 rounded p-4 mb-4">
                <h3 className="font-bold text-green-800 mb-4 flex items-center gap-2">
                  <span className="text-xl">📨</span> Registro de Emails Enviados
                </h3>
                <div className="overflow-x-auto">
                  <table className="w-full bg-white rounded shadow-sm text-sm">
                    <thead className="bg-green-100">
                      <tr>
                        <th className="p-2 text-left">Fecha</th>
                        <th className="p-2 text-left">Destinatario</th>
                        <th className="p-2 text-left">Asunto</th>
                        <th className="p-2 text-left">Estado</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[...sentEmailLog].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).map(log => (
                        <tr key={log.id} className="border-t">
                          <td className="p-2 whitespace-nowrap">{new Date(log.timestamp).toLocaleString()}</td>
                          <td className="p-2">{log.to || 'N/A'}</td>
                          <td className="p-2 font-medium">{log.subject}</td>
                          <td className="p-2 text-green-600 font-bold">{log.status}</td>
                        </tr>
                      ))}
                      {sentEmailLog.length === 0 && (
                        <tr><td colSpan="4" className="p-4 text-center text-gray-500 italic">No hay registros de envío.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* DATA MANAGEMENT (EXPORT/IMPORT) */}
              <div className="mb-8 border-t pt-8">
                <h2 className="text-2xl font-bold mb-4">Gestión de Datos</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {/* EXPORT */}
                  <div className="p-6 bg-blue-50 rounded-xl border border-blue-200">
                    <h3 className="font-bold text-blue-900 mb-2">Exportar Copia de Seguridad</h3>
                    <p className="text-sm text-blue-700 mb-4">Descarga un archivo con todos los datos actuales (usuarios, menús, citas, etc.) para guardarlos o moverlos a otro dispositivo.</p>
                    <button
                      onClick={async () => {
                        const keys = [
                          'users', 'weekAssignments', 'menus', 'menuCellHeight', 'appointments',
                          'shopping', 'emailConfig', 'messages', 'emailQueue', 'inventory',
                          'tasks', 'taskCellHeight', 'actionLogs', 'appointmentTargets', 'menuHeaderPixelSize',
                          'authorizedMenuEditors', 'emailContentConfig', 'sentEmailLog'
                        ];
                        const data = {};
                        for (const key of keys) {
                          const result = await window.storage.get(key, true).catch(() => null);
                          if (result) data[key] = result.value;
                        }
                        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `gestiones_padres_backup_${new Date().toISOString().split('T')[0]}.json`;
                        a.click();
                        URL.revokeObjectURL(url);
                      }}
                      className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-bold shadow-sm"
                    >
                      <Save size={20} /> Descargar Archivo JSON
                    </button>
                  </div>

                  {/* IMPORT */}
                  <div className="p-6 bg-yellow-50 rounded-xl border border-yellow-200">
                    <h3 className="font-bold text-yellow-900 mb-2">Importar Datos</h3>
                    <p className="text-sm text-yellow-800 mb-4">Restaura una copia de seguridad. ⚠️ ¡CUIDADO! Esto borrará los datos actuales y los reemplazará con los del archivo.</p>
                    <div className="flex items-center gap-2">
                      <label className="cursor-pointer bg-yellow-100 text-yellow-800 border border-yellow-300 px-4 py-2 rounded-lg hover:bg-yellow-200 font-bold shadow-sm flex items-center gap-2">
                        <UploadIcon size={20} /> Seleccionar Archivo
                        <input
                          type="file"
                          accept=".json"
                          className="hidden"
                          onChange={(e) => {
                            const file = e.target.files[0];
                            if (!file) return;
                            if (!confirm('¿ESTÁS SEGURO? Se sobrescribirán TODOS los datos actuales con los del archivo. Esta acción no se puede deshacer.')) return;

                            const reader = new FileReader();
                            reader.onload = async (event) => {
                              try {
                                const data = JSON.parse(event.target.result);
                                const keys = Object.keys(data);
                                for (const key of keys) {
                                  // Basic validation could go here
                                  await window.storage.set(key, data[key]);
                                }
                                alert('Datos importados correctamente. La página se recargará.');
                                window.location.reload();
                              } catch (error) {
                                console.error(error);
                                alert('Error al importar el archivo. Asegúrate de que es un backup válido.');
                              }
                            };
                            reader.readAsText(file);
                          }}
                        />
                      </label>
                    </div>
                  </div>
                </div>
              </div>

              {/* ACTIVITY LOGS ADMIN SECTION */}
              <div className="mb-8">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                  <h2 className="text-2xl font-bold text-gray-800">Logs de Actividad</h2>
                  <div className="flex items-center gap-2">
                    <span className="text-sm text-gray-500 font-medium">Mostrar:</span>
                    <select
                      value={logFilter}
                      onChange={(e) => setLogFilter(e.target.value)}
                      className="border rounded-lg px-3 py-1.5 text-sm bg-white text-gray-700 font-medium shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                      <option value="1">Últimas 24 horas</option>
                      <option value="7">Última semana</option>
                      <option value="30">Últimos 30 días</option>
                      <option value="all">Todo el historial</option>
                    </select>
                  </div>
                </div>
                <div className="bg-white rounded-lg border shadow-sm max-h-96 overflow-y-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-gray-100 sticky top-0 z-10">
                      <tr>
                        <th className="p-3 text-left font-bold text-gray-600">Fecha</th>
                        <th className="p-3 text-left font-bold text-gray-600">Usuario</th>
                        <th className="p-3 text-left font-bold text-gray-600">Acción</th>
                        <th className="p-3 text-left font-bold text-gray-600">Detalles</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {[...actionLogs]
                        .filter(log => {
                          if (logFilter === 'all') return true;
                          const logDate = new Date(log.timestamp);
                          const cutoff = new Date();
                          cutoff.setDate(cutoff.getDate() - parseInt(logFilter));
                          return logDate >= cutoff;
                        })
                        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
                        .map(log => (
                          <tr key={log.id} className="hover:bg-gray-50 transition-colors">
                            <td className="p-3 whitespace-nowrap text-gray-500">{new Date(log.timestamp).toLocaleString()}</td>
                            <td className="p-3 font-bold text-indigo-700">{log.user ? log.user.toUpperCase() : 'SISTEMA'}</td>
                            <td className="p-3 text-gray-700 font-medium">{log.action}</td>
                            <td className="p-3 text-gray-600">{log.details}</td>
                          </tr>
                        ))}
                      {[...actionLogs].filter(log => {
                        if (logFilter === 'all') return true;
                        const logDate = new Date(log.timestamp);
                        const cutoff = new Date();
                        cutoff.setDate(cutoff.getDate() - parseInt(logFilter));
                        return logDate >= cutoff;
                      }).length === 0 && (
                        <tr>
                          <td colSpan="4" className="p-8 text-center text-gray-400 italic">No hay actividad registrada en este período.</td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>



              <div>
                <div>
                  <h2 className="text-2xl font-bold mb-4">Asignación de Semanas</h2>

                  {/* FUTURE & CURRENT WEEKS */}
                  <h3 className="font-bold text-gray-700 mb-2 border-b">Semanas Futuras y Actual</h3>
                  <div className="space-y-3 mb-8">
                    {futureWeeks.map(week => {
                      const assigned = getAssignedUser(week.start);
                      return (
                        <div key={week.start} className="flex items-center gap-4 p-3 bg-blue-50 rounded-lg border border-blue-100">
                          <span className="font-medium w-40">{week.label}</span>
                          <select
                            className="flex-1 px-4 py-2 border rounded-lg bg-white"
                            value={assigned || ''}
                            onChange={(e) => {
                              const updated = weekAssignments.filter(a => a.weekStart !== week.start);
                              if (e.target.value) {
                                updated.push({ weekStart: week.start, user: e.target.value });
                              }
                              setWeekAssignments(updated);
                              saveData('weekAssignments', updated);
                            }}
                          >
                            <option value="">Sin asignar</option>
                            <option value="ivan">IVAN</option>
                            <option value="gloria">GLORIA</option>
                            <option value="raquel">RAQUEL</option>
                          </select>
                        </div>
                      );
                    })}
                  </div>

                  {/* PAST WEEKS */}
                  <h3 className="font-bold text-gray-700 mb-2 border-b">Histórico de Asignaciones</h3>
                  <div className="space-y-3">
                    {/* Last 8 Weeks */}
                    {weeks.past.slice(0, 8).map(week => {
                      const assigned = getAssignedUser(week.start);
                      return (
                        <div key={week.start} className="flex items-center gap-4 p-3 bg-gray-50 rounded-lg border border-gray-200 opacity-80 hover:opacity-100 transition">
                          <span className="font-medium w-40 text-gray-600">{week.label}</span>
                          <select
                            className="flex-1 px-4 py-2 border rounded-lg bg-white text-sm"
                            value={assigned || ''}
                            onChange={(e) => {
                              const updated = weekAssignments.filter(a => a.weekStart !== week.start);
                              if (e.target.value) {
                                updated.push({ weekStart: week.start, user: e.target.value });
                              }
                              setWeekAssignments(updated);
                              saveData('weekAssignments', updated);
                            }}
                          >
                            <option value="">Sin asignar</option>
                            <option value="ivan">IVAN</option>
                            <option value="gloria">GLORIA</option>
                            <option value="raquel">RAQUEL</option>
                          </select>
                        </div>
                      );
                    })}

                    {/* Older Weeks Dropdown */}
                    {weeks.past.length > 8 && (
                      <div className="mt-4 p-4 bg-gray-100 rounded-lg border border-gray-300">
                        <label className="block text-sm font-bold text-gray-600 mb-2">Más antiguas (+8 semanas):</label>
                        <div className="flex gap-4">
                          <select
                            className="flex-1 p-2 border rounded"
                            onChange={(e) => {
                              // Start editing this specific old week
                              // We can reuse a temporary state or just force render of this single line
                              // Simpler: Just render the selector for the *selected* week from this dropdown?
                              // Let's use a local state for currently selected old week in Admin view?
                              // Since I can't add state to AdminView easily without refactoring the whole component or breaking hooks (if I add it inside condition),
                              // I will use a simple approach: The select changes a variable if I can, OR
                              // BETTER: Just render the list of ALL remaining past weeks but inside a collapsed <details> tag? 
                              // User asked for "un desplegable para mas si es necesario". 
                              // A <details> tag with the rest of the list is exactly that visually.
                            }}
                            // Actually, let's try the <details> approach as it's cleaner than adding state dynamically in a big return block 
                            // without a proper React state variable which I can't add easily now.
                            // WAIT, I can't add state hooks conditionally or inside the return. 
                            // But I CAN add state to the parent component `ParentManager` (too far) or just use `<details>`.
                            // However, `<details>` opens a list.
                            // User text: "un desplegable para mas si es necesario... debo poder ver en cada semana ... quien lo tiene asignado y cambiar".
                            // A literal <select> (dropdown) implies selecting ONE week and then showing its assignment.
                            // Without new state, I cannot easily select one week to show its specific dropdown.
                            // PROPOSAL: Use <details> content to show the rest of the list. It satisfies "dropdown" visual behavior (expanding menu).
                            // If strict "dropdown selector" is needed, I'd need to refactor to add `selectedOldWeek` state.
                            // Let's go with <details> as it's robust and allows bulk edit if needed without complex state.
                            style={{ display: 'none' }} // Dummy for logic comment
                          />

                          <details className="w-full">
                            <summary className="cursor-pointer font-bold text-blue-600 hover:text-blue-800 p-2 border border-blue-200 rounded bg-blue-50">
                              Ver semanas anteriores ({weeks.past.length - 8})
                            </summary>
                            <div className="mt-2 space-y-2 pl-4 border-l-2 border-gray-300">
                              {weeks.past.slice(8).map(week => {
                                const assigned = getAssignedUser(week.start);
                                return (
                                  <div key={week.start} className="flex items-center gap-4 p-2 bg-gray-50 rounded border border-gray-200 text-sm">
                                    <span className="font-medium w-40 text-gray-500">{week.label}</span>
                                    <select
                                      className="flex-1 px-2 py-1 border rounded bg-white"
                                      value={assigned || ''}
                                      onChange={(e) => {
                                        const updated = weekAssignments.filter(a => a.weekStart !== week.start);
                                        if (e.target.value) {
                                          updated.push({ weekStart: week.start, user: e.target.value });
                                        }
                                        setWeekAssignments(updated);
                                        saveData('weekAssignments', updated);
                                      }}
                                    >
                                      <option value="">Sin asignar</option>
                                      <option value="ivan">IVAN</option>
                                      <option value="gloria">GLORIA</option>
                                      <option value="raquel">RAQUEL</option>
                                    </select>
                                  </div>
                                );
                              })}
                            </div>
                          </details>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div >
          </div >
        );
      }


      return <div className="p-8">Vista en desarrollo...</div>;
    };


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ParentManager />);
  </script>
</body>

</html>
