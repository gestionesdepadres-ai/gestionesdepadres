                        />
                      </div>
                      <div>
                        <label className="block font-medium mb-1">Quién acompaña:</label>
                        <input
                          type="text"
                          className="w-full px-3 py-2 border rounded-lg"
                          value={newAppointment.companion}
                          onChange={(e) => setNewAppointment({ ...newAppointment, companion: e.target.value })}
                        />
                      </div>
                      <div className="col-span-2">
                        <p className="text-sm text-gray-600">Creado por: <strong>{user.id.toUpperCase()}</strong></p>
                      </div>
                    </div>
                    <div className="flex gap-2 mt-4">
                      <button
                        onClick={saveAppointment}
                        className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"
                      >
                        Guardar
                      </button>
                      <button
                        onClick={() => { setShowNewAppointment(false); setNewAppointment({ date: '', time: '', title: '', companion: '' }); }}
                        className="px-4 py-2 bg-gray-400 text-white rounded-lg hover:bg-gray-500"
                      >
                        Cancelar
                      </button>
                    </div>
                  </div>
                )}

                {appointmentView === 'day' && (
                  <div>
                    <div className="flex items-center gap-4 mb-4">
                      <button
                        onClick={() => {
                          const newDate = new Date(selectedDate);
                          newDate.setDate(newDate.getDate() - 1);
                          setSelectedDate(newDate);
                        }}
                        className="p-2 bg-gray-200 rounded hover:bg-gray-300"
                      >
                        <ChevronLeft size={20} />
                      </button>
                      <input
                        type="date"
                        className="px-4 py-2 border rounded-lg"
                        value={selectedDate.toISOString().split('T')[0]}
                        onChange={(e) => setSelectedDate(new Date(e.target.value))}
                      />
                      <button
                        onClick={() => {
                          const newDate = new Date(selectedDate);
                          newDate.setDate(newDate.getDate() + 1);
                          setSelectedDate(newDate);
                        }}
                        className="p-2 bg-gray-200 rounded hover:bg-gray-300"
                      >
                        <ChevronRight size={20} />
                      </button>
                    </div>
                    <div className="space-y-2">
                      {Array.from({ length: 24 }, (_, i) => {
                        const hour = i.toString().padStart(2, '0');
                        const hourAppointments = getAppointmentsForDate(selectedDate).filter(a => a.time.startsWith(hour));
                        return hourAppointments.length > 0 ? (
                          <div key={i} className="p-3 bg-blue-50 rounded-lg border border-blue-200">
                            <div className="font-bold text-blue-800">{hour}:00</div>
                            {hourAppointments.map(app => (
                              <div key={app.id} className="mt-2 p-3 bg-white rounded shadow-sm">
                                <div className="flex justify-between items-start">
                                  <div className="flex-1">
                                    <div className="font-semibold">{app.time} - {app.title}</div>
                                    <div className="text-sm text-gray-600">Creado por: {app.createdBy.toUpperCase()}</div>
                                    {editingAppointment === app.id ? (
                                      <div className="mt-2 space-y-2">
                                        {(user.id === app.createdBy || user.isAdmin) ? (
                                          <>
                                            <div className="flex gap-2">
                                              <input type="time" step="300" className="border rounded p-1 text-xs" value={app.time} onChange={(e) => updateAppointment(app.id, 'time', e.target.value)} />
                                              <select className="border rounded p-1 text-xs flex-1" value={app.target || ''} onChange={(e) => updateAppointment(app.id, 'target', e.target.value)}>
                                                {appointmentTargets.filter(t => t.active).map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                                              </select>
                                            </div>
                                            <input type="text" className="w-full border rounded p-1 text-sm" value={app.title} onChange={(e) => updateAppointment(app.id, 'title', e.target.value)} />
                                            <input type="date" className="w-full border rounded p-1 text-sm" value={app.date} onChange={(e) => updateAppointment(app.id, 'date', e.target.value)} />
                                            <input type="text" className="w-full border rounded p-1 text-sm" value={app.companion} onChange={(e) => updateAppointment(app.id, 'companion', e.target.value)} placeholder="Acompañante" />
                                          </>
                                        ) : (
                                          <input
                                            type="text"
                                            className="w-full px-2 py-1 border rounded text-sm"
                                            value={app.companion}
                                            onChange={(e) => updateAppointment(app.id, 'companion', e.target.value)}
                                            placeholder="Quién acompaña..."
                                          />
                                        )}
                                        <button
                                          onClick={() => setEditingAppointment(null)}
                                          className="mt-1 text-xs text-green-600 font-bold"
                                        >
                                          Guardar
                                        </button>
                                      </div>
                                    ) : (
                                      <div className="text-sm text-gray-600">
                                        Acompaña: {app.companion || '-'}
                                        <button
                                          onClick={() => setEditingAppointment(app.id)}
                                          className="ml-2 text-blue-600 text-xs"
                                        >
                                          Editar
                                        </button>
                                      </div>
                                    )}
                                  </div>
                                  {(user.id === app.createdBy || user.isAdmin) && (
                                    <button
                                      onClick={() => deleteAppointment(app.id, app.createdBy)}
                                      className="text-red-600 hover:text-red-800"
                                    >
                                      <Trash2 size={18} />
                                    </button>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>
                        ) : null;
                      })}
                      {getAppointmentsForDate(selectedDate).length === 0 && (
                        <div className="text-center text-gray-500 py-8">No hay citas para este día</div>
                      )}
                    </div>
                  </div>
                )}

                {appointmentView === 'week' && (
                  <div>
                    <div className="flex items-center gap-4 mb-4">
                      <button
                        onClick={() => {
                          const newDate = new Date(selectedDate);
                          newDate.setDate(newDate.getDate() - 7);
                          setSelectedDate(newDate);
                        }}
                        className="p-2 bg-gray-200 rounded hover:bg-gray-300"
                      >
                        <ChevronLeft size={20} />
                      </button>
                      <span className="font-bold text-lg">
                        Semana del {new Date(currentWeekStart).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' })} al {new Date(new Date(currentWeekStart).getTime() + 6 * 24 * 60 * 60 * 1000).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' })}
                      </span>
                      <button
                        onClick={() => {
                          const newDate = new Date(selectedDate);
                          newDate.setDate(newDate.getDate() + 7);
                          setSelectedDate(newDate);
                        }}
                        className="p-2 bg-gray-200 rounded hover:bg-gray-300"
                      >
                        <ChevronRight size={20} />
                      </button>
                    </div>
                    <div className="space-y-3">
                      {weekData.map((dayInfo) => {
                        const dateObj = new Date(dayInfo.date);
                        return dayInfo.appointments.length > 0 ? (
                          <div key={dayInfo.date} className="p-4 bg-blue-50 rounded-lg border border-blue-200">
                            <div className="font-bold text-lg text-blue-800 mb-2">
                              {dayInfo.day} - {dateObj.getDate()}/{dateObj.getMonth() + 1}
                            </div>
                            {dayInfo.appointments.map(app => (
                              <div key={app.id} className="mt-2 p-3 bg-white rounded shadow-sm border-l-4 border-blue-400">
                                <div className="flex justify-between items-start">
                                  <div className="flex-1">
                                    <div className="font-semibold">{app.time} <span className="text-blue-600">[{app.target ? app.target.toUpperCase() : 'PAPA'}]</span> - {app.title}</div>
                                    <div className="text-sm text-gray-600">Creado por: {app.createdBy.toUpperCase()}</div>
                                    {editingAppointment === app.id ? (
                                      <div className="mt-2">
                                        <input
                                          type="text"
                                          className="w-full px-2 py-1 border rounded text-sm"
                                          value={app.companion}
                                          onChange={(e) => updateAppointment(app.id, 'companion', e.target.value)}
                                          placeholder="Quién acompaña..."
                                        />
                                        <button
                                          onClick={() => setEditingAppointment(null)}
                                          className="mt-1 text-xs text-green-600"
                                        >
                                          Guardar
                                        </button>
                                      </div>
                                    ) : (
                                      <div className="text-sm text-gray-600">
                                        Acompaña: {app.companion || '-'}
                                        <button
                                          onClick={() => setEditingAppointment(app.id)}
                                          className="ml-2 text-blue-600 text-xs"
                                        >
                                          Editar
                                        </button>
                                      </div>
                                    )}
                                  </div>
                                  {(user.id === app.createdBy || user.isAdmin) && (
                                    <button
                                      onClick={() => deleteAppointment(app.id, app.createdBy)}
                                      className="text-red-600 hover:text-red-800"
                                    >
                                      <Trash2 size={18} />
                                    </button>
                                  )}
                                </div>
                              </div>
                            ))
                            }
                          </div>
                        ) : null;
                      })}
                      {weekData.every(d => d.appointments.length === 0) && (
                        <div className="text-center text-gray-500 py-8">No hay citas esta semana</div>
                      )}
                    </div>
                  </div>
                )}

                {appointmentView === 'month' && (
                  <div>
                    <div className="flex items-center gap-4 mb-4">
                      <button
                        onClick={() => {
                          const newDate = new Date(selectedDate);
                          newDate.setMonth(newDate.getMonth() - 1);
                          setSelectedDate(newDate);
                        }}
                        className="p-2 bg-gray-200 rounded hover:bg-gray-300"
                      >
                        <ChevronLeft size={20} />
                      </button>
                      <span className="font-bold text-lg">
                        {selectedDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }).toUpperCase()}
                      </span>
                      <button
                        onClick={() => {
                          const newDate = new Date(selectedDate);
                          newDate.setMonth(newDate.getMonth() + 1);
                          setSelectedDate(newDate);
                        }}
                        className="p-2 bg-gray-200 rounded hover:bg-gray-300"
                      >
                        <ChevronRight size={20} />
                      </button>
                    </div>
                    <div className="space-y-3">
                      {getAppointmentsForMonth(year, month).map(day => {
                        const dateObj = new Date(day.date);
                        return (
                          <div key={day.date} className="p-4 bg-blue-50 rounded-lg border border-blue-200">
                            <div className="font-bold text-lg text-blue-800 mb-2">
                              {dateObj.getDate()} de {dateObj.toLocaleDateString('es-ES', { month: 'long' })}
                            </div>
                            {day.appointments.map(app => (
                              <div key={app.id} className="mt-2 p-3 bg-white rounded shadow-sm">
                                <div className="flex justify-between items-start">
                                  <div className="flex-1">
                                    <div className="font-semibold">{app.time} - {app.title}</div>
                                    <div className="text-sm text-gray-600">Creado por: {app.createdBy.toUpperCase()}</div>
                                    {editingAppointment === app.id ? (
                                      <div className="mt-2">
                                        <input
                                          type="text"
                                          className="w-full px-2 py-1 border rounded text-sm"
                                          value={app.companion}
                                          onChange={(e) => updateAppointment(app.id, 'companion', e.target.value)}
                                          placeholder="Quién acompaña..."
                                        />
                                        <button
                                          onClick={() => setEditingAppointment(null)}
                                          className="mt-1 text-xs text-green-600"
                                        >
                                          Guardar
                                        </button>
                                      </div>
                                    ) : (
                                      <div className="text-sm text-gray-600">
                                        Acompaña: {app.companion || '-'}
                                        <button
                                          onClick={() => setEditingAppointment(app.id)}
                                          className="ml-2 text-blue-600 text-xs"
                                        >
                                          Editar
                                        </button>
                                      </div>
                                    )}
                                  </div>
                                  {(user.id === app.createdBy || user.isAdmin) && (
                                    <button
                                      onClick={() => deleteAppointment(app.id, app.createdBy)}
                                      className="text-red-600 hover:text-red-800"
                                    >
                                      <Trash2 size={18} />
                                    </button>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>
                        );
                      })}
                      {getAppointmentsForMonth(year, month).length === 0 && (
                        <div className="text-center text-gray-500 py-8">No hay citas en este mes</div>
                      )}
                    </div>
                  </div>
                )}

                {appointmentView === 'text' && (
                  <div>
                    <div className="flex justify-end mb-4">
                      <button
                        onClick={() => {
                          const textData = appointments.sort((a, b) => new Date(a.date) - new Date(b.date)).map(app =>
                            `${app.date} ${app.time} - ${app.target || 'PAPA'} - ${app.title} (Acompaña: ${app.companion || '-'})`
                          ).join('\n');
                          navigator.clipboard.writeText(textData);
                          alert('Listado copiado al portapapeles');
                        }}
                        className="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 flex items-center gap-2"
                      >
                        <span className="text-xl">📋</span> Copiar Todo al Portapapeles
                      </button>
                    </div>
                    <div className="space-y-2 max-h-[70vh] overflow-y-auto border rounded p-2">
                      <table className="w-full text-sm text-left">
                        <thead className="bg-gray-100 sticky top-0">
                          <tr>
                            <th className="p-2">Fecha</th>
                            <th className="p-2">Hora</th>
                            <th className="p-2">Para</th>
                            <th className="p-2">Asunto</th>
                            <th className="p-2">Acompañante</th>
                            <th className="p-2">Creado Por</th>
                          </tr>
                        </thead>
                        <tbody>
                          {[...appointments].sort((a, b) => new Date(b.date) - new Date(a.date)).map(app => (
                            <tr key={app.id} className="border-b hover:bg-gray-50">
                              <td className="p-2">{new Date(app.date).toLocaleDateString()}</td>
                              <td className="p-2">{app.time}</td>
                              <td className="p-2">{app.target || 'PAPA'}</td>
                              <td className="p-2 font-medium">{app.title}</td>
                              <td className="p-2">{app.companion || '-'}</td>
                              <td className="p-2 text-xs text-gray-500">{app.createdBy.toUpperCase()}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                      {appointments.length === 0 && <div className="p-4 text-center text-gray-500">No hay citas registradas.</div>}
                    </div>
                  </div>
                )}
              </div>

              <div className="mt-6 bg-white rounded-xl shadow-lg p-6">
                <h2 className="text-xl font-bold mb-4 text-gray-700">Citas Pasadas</h2>
                <div className="space-y-2 max-h-96 overflow-y-auto">
                  {getPastAppointments().map(app => (
                    <div key={app.id} className="p-3 bg-gray-50 rounded-lg border border-gray-200">
                      <div className="flex justify-between items-start">
                        <div className="flex-1">
                          <div className="font-semibold text-gray-600">
                            {new Date(app.date).toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' })} - {app.time} - {app.title}
                          </div>
                          <div className="text-sm text-gray-500">Creado por: {app.createdBy.toUpperCase()}</div>
                          {app.companion && <div className="text-sm text-gray-500">Acompañó: {app.companion}</div>}
                        </div>
                      </div>
                    </div>
                  ))}
                  {getPastAppointments().length === 0 && (
                    <div className="text-center text-gray-500 py-4">No hay citas pasadas</div>
                  )}
                </div>
              </div>

              <div className="mt-6 bg-white rounded-xl shadow-lg p-6">
                <h2 className="text-xl font-bold mb-4 text-red-700">Citas Eliminadas</h2>
                <div className="space-y-2 max-h-96 overflow-y-auto">
                  {getDeletedAppointments().map(app => (
                    <div key={app.id} className="p-3 bg-red-50 rounded-lg border border-red-200">
                      <div className="flex justify-between items-center">
                        <div className="flex-1">
                          <div className="font-semibold text-gray-600 line-through">
                            {new Date(app.date).toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' })} - {app.time} - {app.title}
                          </div>
                          <div className="text-sm text-gray-500">
                            Eliminada por {app.deletedBy ? app.deletedBy.toUpperCase() : 'DESCONOCIDO'} el {app.deletedDate ? new Date(app.deletedDate).toLocaleDateString('es-ES') : '-'}
                          </div>
                        </div>
                        {user.isAdmin && (
                          <button
                            onClick={() => permanentlyDeleteAppointment(app.id)}
                            className="bg-red-600 text-white p-2 rounded hover:bg-red-700 ml-2"
                            title="Borrar Definitivamente"
                          >
                            <Trash2 size={16} />
                          </button>
                        )}
                      </div>
                    </div>
                  ))}
                  {getDeletedAppointments().length === 0 && (
                    <div className="text-center text-gray-500 py-4">No hay citas eliminadas</div>
                  )}
                </div>
              </div>
            </div>
          </div >
        );
      }

      if (view === 'shopping' && mainView === 'main') {
        const activeItems = shopping.filter(s => !s.purchased);
        const anyoneItems = activeItems.filter(s => s.buyerType === 'anyone').sort((a, b) => a.id - b.id);
        const myOnlyItems = activeItems.filter(s => s.buyerType === 'meonly');
        const purchasedItems = shopping.filter(s => s.purchased).sort((a, b) => new Date(b.purchasedDate) - new Date(a.purchasedDate));

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-7xl mx-auto">
              <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                <button
                  onClick={() => setView('main')}
                  className="flex items-center gap-2 px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 mb-4"
                >
                  <ArrowLeft size={20} /> Volver
                </button>
                <h1 className="text-3xl font-bold text-gray-800 mb-6">Carro de la Compra</h1>

                <div className="mb-6 p-4 bg-green-50 rounded-lg border-2 border-green-200">
                  <h3 className="font-bold text-lg mb-3">Agregar Artículo</h3>
                  <div className="flex flex-col gap-3">
                    <input
                      type="text"
                      className="w-full px-4 py-2 border rounded-lg"
                      value={newShoppingItem}
                      onChange={(e) => setNewShoppingItem(e.target.value)}
                      placeholder="Nombre del artículo..."
                      onKeyPress={(e) => e.key === 'Enter' && addShoppingItem()}
                    />
                    <div className="flex gap-3">
                      <select
                        className="flex-1 px-4 py-2 border rounded-lg"
                        value={newShoppingType}
                        onChange={(e) => setNewShoppingType(e.target.value)}
                      >
                        <option value="anyone">Cualquiera</option>
                        <option value="meonly">Solo yo</option>
                      </select>
                      <button
                        onClick={addShoppingItem}
                        className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"
                      >
                        <Plus size={20} />
                      </button>
                    </div>
                  </div>
                </div>

                <div className="grid md:grid-cols-2 gap-6">
                  <div className="bg-white rounded-xl shadow-lg p-6">
                    <h2 className="text-xl font-bold mb-4 text-blue-700">Cualquiera puede comprar</h2>
                    <div className="space-y-2">
                      {anyoneItems.map(item => (
                        <div key={item.id} className="p-3 bg-blue-50 rounded-lg border border-blue-200 flex justify-between items-center">
                          <div className="flex-1">
                            <div className="font-medium">{item.item}</div>
                            <div className="text-xs text-gray-600">Agregado por: {item.createdBy.toUpperCase()}</div>
                          </div>
                          <div className="flex gap-2">
                            <button
                              onClick={() => purchaseItem(item.id)}
                              className="px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700 text-sm"
                            >
                              <Check size={16} />
                            </button>
                            {(user.id === item.createdBy || user.isAdmin) && (
                              <button
                                onClick={() => deleteShoppingItem(item.id, item.createdBy)}
                                className="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700 text-sm"
                              >
                                <Trash2 size={16} />
                              </button>
                            )}
                          </div>
                        </div>
                      ))}
                      {anyoneItems.length === 0 && (
                        <div className="text-center text-gray-500 py-4">No hay artículos pendientes</div>
                      )}
                    </div>
                  </div>

                  <div className="bg-white rounded-xl shadow-lg p-6">
                    <h2 className="text-xl font-bold mb-4 text-orange-700">Solo yo compro</h2>
                    <div className="space-y-2">
                      {myOnlyItems.map(item => (
                        <div key={item.id} className="p-3 bg-orange-50 rounded-lg border border-orange-200 flex justify-between items-center">
                          <div className="flex-1">
                            <div className="font-medium">{item.item}</div>
                            <div className="text-xs text-gray-600">({item.createdBy.toUpperCase()})</div>
                          </div>
                          {(user.id === item.createdBy || user.isAdmin) && (
                            <div className="flex gap-2">
                              <button
                                onClick={() => purchaseItem(item.id)}
                                className="px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700 text-sm"
                              >
                                <Check size={16} />
                              </button>
                              <button
                                onClick={() => deleteShoppingItem(item.id, item.createdBy)}
                                className="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700 text-sm"
                              >
                                <Trash2 size={16} />
                              </button>
                            </div>
                          )}
                        </div>
                      ))}
                      {myOnlyItems.length === 0 && (
                        <div className="text-center text-gray-500 py-4">No hay artículos pendientes</div>
                      )}
                    </div>
                  </div>
                </div>

                <div className="mt-6 bg-white rounded-xl shadow-lg p-6">
                  <h2 className="text-xl font-bold mb-4 text-green-700">Historial de Compras</h2>
                  <div className="space-y-2 max-h-96 overflow-y-auto">
                    {purchasedItems.map(item => (
                      <div key={item.id} className="p-3 bg-green-50 rounded-lg border border-green-200">
                        <div className="flex justify-between items-center">
                          <div className="flex-1">
                            <div className="font-medium line-through text-gray-600">{item.item}</div>
                            <div className="text-xs text-gray-600">
                              Comprado por {item.purchasedBy.toUpperCase()} el {new Date(item.purchasedDate).toLocaleDateString('es-ES')}
                            </div>
                          </div>
                          {user.isAdmin && (
                            <button
                              onClick={() => deleteShoppingItem(item.id, item.createdBy)}
                              className="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700 text-sm ml-2"
                            >
                              <Trash2 size={16} />
                            </button>
                          )}
                        </div>
                      </div>
                    ))}
                    {purchasedItems.length === 0 && (
                      <div className="text-center text-gray-500 py-4">No hay compras registradas</div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (view === 'inventory' && mainView === 'main') {
        const filteredItems = inventory
          .filter(i => i.type === inventoryTab && !i.deleted)
          .sort((a, b) => {
            const dateA = new Date(a.lastModified || a.date);
            const dateB = new Date(b.lastModified || b.date);
            return dateB - dateA;
          });

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-4xl mx-auto">
              <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                <button
                  onClick={() => setView('main')}
                  className="flex items-center gap-2 px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 mb-4"
                >
                  <ArrowLeft size={20} /> Volver
                </button>
                <h1 className="text-3xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                  <Package /> Gestión de Alimentos
                </h1>

                {/* TABS */}
                <div className="flex bg-gray-100 p-1 rounded-lg mb-6 gap-1">
                  <button
                    className={`flex-1 py-3 rounded-md font-bold transition-all ${inventoryTab === 'nevera' ? 'bg-white shadow text-cyan-700' : 'text-gray-500 hover:bg-gray-200'}`}
                    onClick={() => setInventoryTab('nevera')}
                  >
                    ❄️ NEVERA
                  </button>
                  <button
                    className={`flex-1 py-3 rounded-md font-bold transition-all ${inventoryTab === 'congelador' ? 'bg-white shadow text-blue-700' : 'text-gray-500 hover:bg-gray-200'}`}
                    onClick={() => setInventoryTab('congelador')}
                  >
                    CONGELADOR
                  </button>
                  <button
                    className={`flex-1 py-3 rounded-md font-bold transition-all ${inventoryTab === 'despensa' ? 'bg-white shadow text-amber-700' : 'text-gray-500 hover:bg-gray-200'}`}
                    onClick={() => setInventoryTab('despensa')}
                  >
                    🥫 DESPENSA
                  </button>
                </div>

                {/* ADD FORM */}
                <div className="bg-cyan-50 border border-cyan-200 p-4 rounded-lg mb-6">
                  <h3 className="font-bold mb-3 text-cyan-800">Añadir Nuevo Artículo</h3>
                  <div className="flex flex-wrap gap-3 items-end">
                    <div>
                      <label className="block text-xs font-bold mb-1">Cantidad</label>
                      <select
                        className="p-2 border rounded-lg w-20"
                        value={newInventoryItem.quantity}
                        onChange={(e) => setNewInventoryItem({ ...newInventoryItem, quantity: parseInt(e.target.value) })}
                      >
                        {[...Array(20).keys()].map(i => <option key={i + 1} value={i + 1}>{i + 1}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold mb-1">Unidad</label>
                      <select
                        className="p-2 border rounded-lg w-32"
                        value={newInventoryItem.unit}
                        onChange={(e) => setNewInventoryItem({ ...newInventoryItem, unit: e.target.value })}
                      >
                        <option value="unidades">Unidades</option>
                        <option value="kg">Kg</option>
                        <option value="gr">Gramos</option>
                        <option value="litros">Litros</option>
                        <option value="paquetes">Paquetes</option>
                        <option value="botes">Botes</option>
                        <option value="latas">Latas</option>
                      </select>
                    </div>
                    <div className="flex-1 min-w-[200px]">
                      <label className="block text-xs font-bold mb-1">Nombre del producto</label>
                      <input
                        type="text"
                        className="w-full p-2 border rounded-lg"
                        placeholder="Ej: Tomates, Pechuga de pollo..."
                        value={newInventoryItem.name}
                        onChange={(e) => setNewInventoryItem({ ...newInventoryItem, name: e.target.value })}
                        onKeyPress={(e) => e.key === 'Enter' && addInventoryItem()}
                      />
                    </div>
                    <button
                      onClick={addInventoryItem}
                      className="bg-cyan-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-cyan-700 h-[42px]"
                    >
                      Añadir
                    </button>
                  </div>
                </div>

                {/* LIST */}
                <div className="bg-gray-50 rounded-lg border border-gray-200 overflow-hidden">
                  <table className="w-full text-left bg-white">
                    <thead className="bg-gray-100 text-gray-600 font-bold uppercase text-xs">
                      <tr>
                        <th className="p-3">Cant.</th>
                        <th className="p-3">Producto</th>
                        <th className="p-3">Detalles</th>
                        <th className="p-3 text-right">Acciones</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {filteredItems.map(item => (
                        <tr key={item.id} className="hover:bg-gray-50">
                          <td className="p-3 font-bold text-gray-700 w-24">
                            {editingInventoryId === item.id ? (
                              <div className="flex gap-1">
                                <input
                                  type="number"
                                  className="w-12 border rounded px-1"
                                  value={item.quantity}
                                  onChange={(e) => updateInventoryItem(item.id, 'quantity', e.target.value)}
                                />
                              </div>
                            ) : (
                              <span>{item.quantity} {item.unit}</span>
                            )}
                          </td>
                          <td className="p-3 font-semibold text-gray-800">
                            {editingInventoryId === item.id ? (
                              <input
                                type="text"
                                className="w-full border rounded px-1"
                                value={item.name}
                                onChange={(e) => updateInventoryItem(item.id, 'name', e.target.value)}
                              />
                            ) : (
                              item.name
                            )}
                          </td>
                          <td className="p-3 text-xs text-gray-500">
                            <div>Alta: {new Date(item.date).toLocaleDateString()} ({item.createdBy})</div>
                            {item.lastModified !== item.date && (
                              <div className="text-cyan-600 max-w-[150px] truncate">
                                Mod: {new Date(item.lastModified).toLocaleDateString()} {item.lastModifiedBy ? `(${item.lastModifiedBy})` : ''}
                              </div>
                            )}
                          </td>
                          <td className="p-3 text-right">
                            {editingInventoryId === item.id ? (
                              <button onClick={() => setEditingInventoryId(null)} className="text-green-600 hover:bg-green-50 p-2 rounded">
                                <Check size={18} />
                              </button>
                            ) : (
                              <div className="flex justify-end gap-2">
                                <button onClick={() => setEditingInventoryId(item.id)} className="text-blue-600 hover:bg-blue-50 p-2 rounded">
                                  <Edit size={18} />
                                </button>
                                <button onClick={() => deleteInventoryItem(item.id)} className="text-red-600 hover:bg-red-50 p-2 rounded">
                                  <Trash2 size={18} />
                                </button>
                              </div>
                            )}
                          </td>
                        </tr>
                      ))}
                      {filteredItems.length === 0 && (
                        <tr>
                          <td colSpan="4" className="p-8 text-center text-gray-400">
                            No hay productos en {inventoryTab === 'nevera' ? 'la nevera' : 'el congelador'}.
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>

                {/* DELETED ITEMS HISTORY SECTION */}
                <div className="mt-8 border-t pt-6">
                  <h3 className="font-bold text-red-700 mb-4 flex items-center gap-2">
                    <Trash2 size={20} /> Historial de Eliminados ({inventoryTab.toUpperCase()})
                  </h3>
                  <div className="bg-red-50 rounded-lg border border-red-100 overflow-hidden max-h-60 overflow-y-auto">
                    <table className="w-full text-left text-sm">
                      <thead className="bg-red-100 text-red-800">
                        <tr>
                          <th className="p-2">Producto</th>
                          <th className="p-2">Eliminado Por</th>
                          <th className="p-2 text-right">Acción</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-red-100">
                        {inventory.filter(i => i.type === inventoryTab && i.deleted).map(item => (
                          <tr key={item.id}>
                            <td className="p-2 text-gray-600">
                              <span className="line-through">{item.quantity} {item.unit} {item.name}</span>
                            </td>
                            <td className="p-2 text-gray-600">
                              {item.deletedBy ? item.deletedBy.toUpperCase() : '?'} ({new Date(item.deletedDate).toLocaleDateString()})
                            </td>
                            <td className="p-2 text-right">
                              {user.isAdmin && (
                                <button
                                  onClick={() => permanentlyDeleteInventoryItem(item.id)}
                                  className="text-red-600 hover:text-red-800 font-bold"
                                >
                                  <Trash2 size={16} />
                                </button>
                              )}
                            </td>
                          </tr>
                        ))}
                        {inventory.filter(i => i.type === inventoryTab && i.deleted).length === 0 && (
                          <tr>
                            <td colSpan="3" className="p-4 text-center text-gray-400 font-style-italic">No hay eliminados recientes.</td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            </div>
          </div>
        );
      }

      if (view === 'tasks' && mainView === 'main') {
        const weekStart = getLocalDateISOString(getMondayOfWeek(currentTaskDate));
        const weekDates = getWeekDates(weekStart);
        const days = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
        const today = new Date().toISOString().split('T')[0];

        const weekTask = tasks.find(w => w.weekStart === weekStart);
        const getTaskContent = (dayIdx) => weekTask?.days?.[dayIdx]?.content || '';

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-7xl mx-auto">
              <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                <button
                  onClick={() => setView('main')}
                  className="flex items-center gap-2 px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 mb-4"
                >
                  <ArrowLeft size={20} /> Volver
                </button>
                <div className="flex justify-between items-center mb-6">
                  <h1 className="text-3xl font-bold text-gray-800 flex items-center gap-2">
                    <Clipboard /> Tareas Realizadas
                  </h1>
                  <div className="flex items-center gap-4">
                    <button onClick={() => {
                      const d = new Date(currentTaskDate);
                      d.setDate(d.getDate() - 7);
                      setCurrentTaskDate(d);
                    }} className="p-2 bg-gray-200 rounded hover:bg-gray-300"><ChevronLeft /></button>
                    <span className="font-bold text-lg">
                      Semana del {new Date(weekStart).toLocaleDateString()}
                    </span>
                    <div className="flex gap-2 items-center">
                      <button onClick={() => setTaskTextFormat({ ...taskTextFormat, bold: !taskTextFormat.bold })} className={`px-2 py-1 rounded ${taskTextFormat.bold ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}><strong>B</strong></button>
                      <div className="flex items-center gap-1">
                        <span className="text-xs">T:</span>
                        <input type="number" value={taskTextFormat.fontSize} onChange={(e) => setTaskTextFormat({ ...taskTextFormat, fontSize: parseInt(e.target.value) })} className="w-12 border rounded px-1" />
                      </div>
                    </div>
                    <button onClick={() => {
                      const d = new Date(currentTaskDate);
                      d.setDate(d.getDate() + 7);
                      setCurrentTaskDate(d);
                    }} className="p-2 bg-gray-200 rounded hover:bg-gray-300"><ChevronRight /></button>

                    <button
                      onClick={handleManualSaveTasks}
                      className="ml-4 px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-bold flex items-center gap-2"
                    >
                      <Save size={18} /> Guardar
                    </button>
                  </div>
                </div>

                <div className="overflow-x-auto pb-2">
                  <div className="grid grid-cols-7 gap-2 min-w-[900px]">
                    {days.map((dayName, idx) => {
                      const isToday = weekDates[idx] === today;
                      return (
                        <div key={idx} className={`border-2 rounded-lg p-2 ${isToday ? 'border-blue-500 bg-blue-50' : 'border-gray-200 bg-gray-50'}`}>
                          <div className={`font-bold text-center mb-2 ${isToday ? 'text-blue-700' : 'text-gray-700'}`}>
                            {dayName} {new Date(weekDates[idx]).getDate()}
                          </div>

                          <div className="mb-2">
                            <div className="text-xs font-bold text-gray-500 mb-1 uppercase tracking-wide">Mañana</div>
                            {/* History View (Read Only / Editable) */}
                            <div className="bg-gray-50 border rounded mb-1 overflow-y-auto" style={{ height: `${taskCellHeight * 0.6}px` }}>
                              {(weekTask?.days?.[idx]?.morning || '').split('\n').map((line, i) => {
                                if (!line.trim()) return null;
                                const signature = `(${user.id.toUpperCase()})`;
                                const isMyLine = line.includes(signature);
                                const canEditLine = user.isAdmin || isMyLine;

                                return (
                                  <div key={i} className="text-xs p-1 border-b last:border-0 bg-white flex items-center gap-1">
                                    {canEditLine ? (
                                      user.isAdmin ? (
                                        <input
                                          className="w-full bg-transparent border-none outline-none focus:ring-1 focus:ring-blue-300 rounded px-1"
                                          value={line}
                                          onChange={(e) => updateHistoryLine(weekStart, idx, 'morning', i, e.target.value)}
                                        />
                                      ) : (
                                        <>
                                          <input
                                            className="flex-1 bg-transparent border-none outline-none focus:ring-1 focus:ring-blue-300 rounded px-1"
                                            value={line.replace(signature, '').trim()}
                                            onChange={(e) => updateHistoryLine(weekStart, idx, 'morning', i, `${e.target.value} ${signature}`)}
                                          />
                                          <span className="text-gray-400 font-bold select-none">{signature}</span>
                                        </>
                                      )
                                    ) : (
                                      <span className="text-gray-700 px-1 block">{line}</span>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                            {/* New Input (Append Only) */}
                            <textarea
                              className="w-full p-2 border rounded resize-none focus:ring-2 focus:ring-blue-500 text-sm mb-2 bg-yellow-50"
                              style={{
                                height: `${taskCellHeight * 0.4}px`,
                                fontSize: `${taskTextFormat.fontSize}px`,
                                fontWeight: taskTextFormat.bold ? 'bold' : 'normal',
                                textAlign: taskTextFormat.align
                              }}
                              placeholder="Añadir tarea..."
                              value={pendingTaskInputs[`${weekStart}-${idx}-morning`] || ''}
                              onChange={(e) => handleTaskInputChange(weekStart, idx, 'morning', e.target.value)}
                            />
                          </div>

                          <div>
                            <div className="text-xs font-bold text-gray-500 mb-1 uppercase tracking-wide">Tarde</div>
                            {/* History View (Read Only / Editable) */}
                            <div className="bg-gray-50 border rounded mb-1 overflow-y-auto" style={{ height: `${taskCellHeight * 0.6}px` }}>
                              {(weekTask?.days?.[idx]?.afternoon || '').split('\n').map((line, i) => {
                                if (!line.trim()) return null;
                                const signature = `(${user.id.toUpperCase()})`;
                                const isMyLine = line.includes(signature);
                                const canEditLine = user.isAdmin || isMyLine;

                                return (
                                  <div key={i} className="text-xs p-1 border-b last:border-0 bg-white flex items-center gap-1">
                                    {canEditLine ? (
                                      user.isAdmin ? (
                                        <input
                                          className="w-full bg-transparent border-none outline-none focus:ring-1 focus:ring-blue-300 rounded px-1"
                                          value={line}
                                          onChange={(e) => updateHistoryLine(weekStart, idx, 'afternoon', i, e.target.value)}
                                        />
                                      ) : (
                                        <>
                                          <input
                                            className="flex-1 bg-transparent border-none outline-none focus:ring-1 focus:ring-blue-300 rounded px-1"
                                            value={line.replace(signature, '').trim()}
                                            onChange={(e) => updateHistoryLine(weekStart, idx, 'afternoon', i, `${e.target.value} ${signature}`)}
                                          />
                                          <span className="text-gray-400 font-bold select-none">{signature}</span>
                                        </>
                                      )
                                    ) : (
                                      <span className="text-gray-700 px-1 block">{line}</span>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                            <textarea
                              className="w-full p-2 border rounded resize-none focus:ring-2 focus:ring-indigo-500 text-sm bg-yellow-50"
                              style={{
                                height: `${taskCellHeight * 0.4}px`,
                                fontSize: `${taskTextFormat.fontSize}px`,
                                fontWeight: taskTextFormat.bold ? 'bold' : 'normal',
                                textAlign: taskTextFormat.align
                              }}
                              placeholder="Añadir tarea..."
                              value={pendingTaskInputs[`${weekStart}-${idx}-afternoon`] || ''}
                              onChange={(e) => handleTaskInputChange(weekStart, idx, 'afternoon', e.target.value)}
                            />
                          </div>
                        </div>
                      );

                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if ((view === 'messages' && mainView === 'main') || mainView === 'messages_only') {
        // Retention logic update: 365 days default
        // This is handled in loadData mostly, but we can visually separate logic here if needed.
        // The loadData keeps 30 days by default from config, we should update the default config in loadData or here?
        // Let's assume the user wants access to 1 year. We will update the default retention in usage.

        let myMessages = [];
        if (user.role === 'admin' || user.isAdmin) {
          myMessages = messages;
        } else {
          myMessages = messages.filter(m => {
            if (m.from === user.id) return true;
            if (m.to === user.id) return true;
            if (m.to === 'todos') return true;
            if (m.to === 'users') return true;
            if (user.role === 'cuidador' && m.to === 'caregivers') return true;
            if (user.role !== 'cuidador' && m.to === 'caregivers' && user.permissions?.seeCaregiverMessages) return true;
            return false;
          });
        }
        myMessages = myMessages.sort((a, b) => new Date(b.date) - new Date(a.date));

        // const [showCompose, setShowCompose] = useState(false);
        // Added recipient state locally for compose - FIXED: Moved to top level.

        const handleSendMessage = () => {
          if (!newMessageContent.trim()) return;

          let contentToSend = newMessageContent;
          if (targetRecipient !== 'todos') {
            const targetUser = users.find(u => u.id === targetRecipient);
            if (targetUser) {
              contentToSend = `[PARA ${targetUser.id.toUpperCase()}]: ${newMessageContent}`;
            }
          }

          const newMessage = {
            id: Date.now(),
            from: user.id,
            to: targetRecipient, // Use targetRecipient directly
            content: contentToSend,
            date: new Date().toISOString(),
            read: false
          };

          const updated = [newMessage, ...messages];
          setMessages(updated);
          saveData('messages', updated);

          // TRIGGER EMAIL via System
          const targetUserObj = targetRecipient !== 'todos' ? users.find(u => u.id === targetRecipient) : null;
          notifySystem('messages', 'Nuevo Mensaje', newMessageContent, targetUserObj);

          setNewMessageContent('');
          setShowCompose(false);
        };

        const deleteMessage = (id) => {
          if (!confirm('¿Eliminar mensaje?')) return;
          const updated = messages.filter(m => m.id !== id);
          setMessages(updated);
          saveData('messages', updated);
        };

        return (
          <div className="min-h-screen bg-gray-100 p-4">
            <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden min-h-[80vh] flex flex-col">
              <div className="bg-purple-600 p-4 text-white flex justify-between items-center">
                <div className="flex items-center gap-2">
                  {mainView !== 'messages_only' && (
                    <button onClick={() => setView('main')}><ArrowLeft /></button>
                  )}
                  <h1 className="text-xl font-bold">Mensajería Interna</h1>
                </div>
                <div className="flex items-center gap-4">
                  <div>Hola, {user.id.toUpperCase()}</div>
                  <button onClick={() => { setUser(null); setMainView('login'); }} className="bg-purple-800 px-3 py-1 rounded text-sm">Salir</button>
                </div>
              </div>

              <div className="flex-1 p-4 overflow-y-auto bg-slate-50 flex flex-col">

                {/* Compose Section at top or via button? Requirement: "cuando se selecciona 'escribir un mensaje sale un cuadro muy pequeño, debe ser mas grande" 
                   Let's make it an expandable section or always visible if requested. 
                   The user said "when selecting write a message", implying a button triggering it.
                */}

                {!showCompose ? (
                  <button
                    onClick={() => setShowCompose(true)}
                    className="mb-4 w-full bg-purple-100 text-purple-700 py-3 rounded-lg font-bold hover:bg-purple-200 flex items-center justify-center gap-2 border-2 border-purple-200"
                  >
                    <MessageSquare size={20} /> Escribir Nuevo Mensaje
                  </button>
                ) : (
                  <div className="mb-4 bg-white p-4 rounded-lg shadow border border-purple-200">
                    <h3 className="font-bold text-gray-700 mb-2">Nuevo Mensaje</h3>
                    <div className="mb-2">
                      <label className="text-xs font-bold text-gray-500 mr-2">Dirigido a:</label>
                      <select
                        className="w-full p-2 border rounded-lg mb-2 bg-gray-50"
                        value={targetRecipient}
                        onChange={(e) => setTargetRecipient(e.target.value)}
                      >
                        <option value="todos">PARA TODOS</option>
                        {users.filter(u => u.active && u.id !== user.id).map(u => (
                          <option key={u.id} value={u.id}>{u.id.toUpperCase()}</option>
                        ))}
                      </select>
                    </div>
                    <textarea
                      className="w-full p-3 border rounded-lg mb-2 focus:ring-2 focus:ring-purple-500 min-h-[150px]"
                      placeholder="Escribe aquí tu mensaje..."
                      value={newMessageContent}
                      onChange={(e) => setNewMessageContent(e.target.value)}
                    />
                    <div className="flex justify-end gap-2">
                      <button
                        onClick={() => setShowCompose(false)}
                        className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded"
                      >
                        Cancelar
                      </button>
                      <button
                        onClick={handleSendMessage}
                        className="px-6 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 font-bold"
                      >
                        Enviar
                      </button>
                    </div>
                  </div>
                )}

                <div className="flex-1 overflow-y-auto">
                  <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 border-b pb-1">Histórico de Mensajes</h3>
                  {myMessages.length === 0 && <p className="text-center text-gray-400">No hay mensajes en el histórico</p>}
                  {myMessages.map(msg => {
                    const isMe = msg.from === user.id;
                    return (
                      <div key={msg.id} className={`flex mb-4 ${isMe ? 'justify-end' : 'justify-start'}`}>
                        <div className={`max-w-[80%] rounded-lg p-3 ${isMe ? 'bg-purple-100 text-purple-900 mx-2' : 'bg-white border shadow-sm mx-2'}`}>
                          <div className="flex justify-between items-baseline mb-1 gap-4">
                            <span className="font-bold text-xs">{msg.from.toUpperCase()}
                              {(msg.to === 'todos') && <span className="text-purple-600 ml-1">[{'PARA TODOS'}]</span>}
                            </span>
                            <span className="text-[10px] text-gray-500">{new Date(msg.date).toLocaleString()}</span>
                          </div>
                          <p className="whitespace-pre-wrap">{msg.content}</p>
                          <div className="flex justify-between items-end mt-1">
                            {isMe && (
                              <div className="text-[10px] text-gray-400">
                                {msg.read ? `Leído ${msg.readBy ? 'por ' + msg.readBy : ''}` : 'Enviado'}
                              </div>
                            )}
                            {user.isAdmin && (
                              <button onClick={() => deleteMessage(msg.id)} className="text-red-400 hover:text-red-600 ml-auto">
                                <Trash2 size={12} />
                              </button>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (view === 'admin' && user && user.isAdmin && mainView === 'main') {
        const weeks = getWeeksAround();
        const futureWeeks = [...weeks.current, ...weeks.future];

        const handleSaveAll = () => {
          saveData('emailConfig', emailConfig);
          saveData('users', users);
          saveData('weekAssignments', weekAssignments);
          saveData('menuCellHeight', menuCellHeight);
          saveData('emailQueue', emailQueue);
          saveData('appointmentTargets', appointmentTargets);
          saveData('menuHeaderPixelSize', menuHeaderPixelSize);
          alert('¡Configuración guardada correctamente!');
        };

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-4xl mx-auto">
              <div className="bg-white rounded-xl shadow-lg p-6">
                <div className="flex justify-between items-center mb-6">
                  <button
                    onClick={() => setView('main')}
                    className="flex items-center gap-2 px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600"
                  >
                    <ArrowLeft size={20} /> Volver
                  </button>

                  <button
                    onClick={handleSaveAll}
                    className="flex items-center gap-2 px-6 py-2 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 shadow-md transition-all active:scale-95"
                  >
                    <span className="text-xl">💾</span> Guardar Todo
                  </button>
                </div>
                <h1 className="text-3xl font-bold text-gray-800 mb-6 border-b pb-4">Panel de Administración</h1>

                <div className="mb-8">
                  <h2 className="text-2xl font-bold mb-4">Tamaño de Celdas</h2>

                  <div className="mb-4">
                    <label className="block font-bold mb-2">Altura Celdas Menú</label>
                    <div className="flex items-center gap-4">
                      <input
                        type="range"
                        min="100"
                        max="300"
                        value={menuCellHeight}
                        onChange={(e) => {
                          const h = parseInt(e.target.value);
                          setMenuCellHeight(h);
                          saveData('menuCellHeight', h);
                        }}
                        className="flex-1"
                      />
                      <input
                        type="number"
                        min="100"
                        max="300"
                        value={menuCellHeight}
                        onChange={(e) => {
                          const h = parseInt(e.target.value);
                          setMenuCellHeight(h);
                          saveData('menuCellHeight', h);
                        }}
                        className="w-20 px-3 py-2 border rounded-lg"
                      />
                      <span>px</span>
                    </div>
                  </div>

                  <div className="mb-4">
                    <label className="block font-bold mb-2">Altura Celdas Tareas</label>
                    <div className="flex items-center gap-4">
                      <input
                        type="range"
                        min="150"
                        max="500"
                        value={taskCellHeight}
                        onChange={(e) => {
                          const h = parseInt(e.target.value);
                          setTaskCellHeight(h);
                          saveData('taskCellHeight', h);
                        }}
                        className="flex-1"
                      />
                      <input
                        type="number"
                        min="150"
                        max="500"
                        value={taskCellHeight}
                        onChange={(e) => {
                          const h = parseInt(e.target.value);
                          setTaskCellHeight(h);
                          saveData('taskCellHeight', h);
                        }}
                        className="w-20 px-3 py-2 border rounded-lg"
                      />
                      <span>px</span>
                    </div>
                  </div>

                  <div className="mb-4">
                    <label className="block font-bold mb-2">Tamaño Cabeceras y Textos Menú (px)</label>
                    <div className="flex items-center gap-4">
                      <input
                        type="range"
                        min="8"
                        max="24"
                        value={menuHeaderPixelSize}
                        onChange={(e) => {
                          const s = parseInt(e.target.value);
                          setMenuHeaderPixelSize(s);
                          saveData('menuHeaderPixelSize', s);
                        }}
                        className="flex-1"
                      />
                      <input
                        type="number"
                        min="8"
                        max="24"
                        value={menuHeaderPixelSize}
                        onChange={(e) => {
                          const s = parseInt(e.target.value);
                          setMenuHeaderPixelSize(s);
                          saveData('menuHeaderPixelSize', s);
                        }}
                        className="w-20 px-3 py-2 border rounded-lg"
                      />
                      <span>px</span>
                    </div>
                  </div>



                </div>

                {/* [NEW] Menu Editing Permissions */}
                <div className="mb-8 border-t pt-6">
                  <h2 className="text-2xl font-bold mb-4">Permisos de Edición de Menú Semanal</h2>
                  <div className="bg-yellow-50 border border-yellow-200 rounded p-4 mb-4">
                    <p className="text-sm text-yellow-800 mb-2">
                      Los usuarios seleccionados aquí podrán editar el menú de la semana actual una vez que haya comenzado (Lunes),
                      incluso si no son administradores ni tienen el menú asignado.
                    </p>
                    <div className="flex flex-wrap gap-4">
                      {users.map(u => (
                        <label key={u.id} className="flex items-center gap-2 bg-white px-3 py-2 rounded shadow-sm border cursor-pointer hover:bg-gray-50">
                          <input
                            type="checkbox"
                            checked={authorizedMenuEditors.includes(u.id)}
                            onChange={(e) => {
                              const current = [...authorizedMenuEditors];
                              let updated;
                              if (e.target.checked) updated = [...current, u.id];
                              else updated = current.filter(id => id !== u.id);

                              setAuthorizedMenuEditors(updated);
                              saveData('authorizedMenuEditors', updated);
                            }}
                            className="h-5 w-5 text-blue-600 rounded"
                          />
                          <span className="font-bold text-gray-700">{u.id.toUpperCase()}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="mb-8">
                  <h2 className="text-2xl font-bold mb-4">Gestión de Usuarios</h2>
                  <div className="bg-gray-50 rounded-lg overflow-hidden border">
                    <table className="w-full">
                      <thead className="bg-gray-200">
                        <tr>
                          <th className="p-3 text-left">Usuario</th>
                          <th className="p-3 text-left">Rol</th>
                          <th className="p-3 text-left">Accesos</th>
                          <th className="p-3 text-left">Acciones</th>
                        </tr>
                      </thead>
                      <tbody>
                        {users.map(u => (
                          <tr key={u.id} className="border-t">
                            <td className="p-3">
                              <div className="font-bold">{u.id}</div>
                              <div className="text-xs text-gray-500">{u.email || 'Sin email'}</div>
                            </td>
                            <td className="p-3">
                              <select
                                value={u.role || (u.isAdmin ? 'admin' : 'user')}
                                onChange={(e) => {
                                  if (u.id === 'ivan' && e.target.value !== 'admin') {
                                    alert('No puedes cambiar el rol del Super Admin');
                                    return;
                                  }
                                  const updated = users.map(user =>
                                    user.id === u.id ? { ...user, role: e.target.value, isAdmin: e.target.value === 'admin' } : user
                                  );
                                  setUsers(updated);
                                  saveData('users', updated);
                                }}
                                className="border rounded px-2 py-1 text-sm"
                              >
                                <option value="user">Usuario</option>
                                <option value="admin">Admin</option>
                                <option value="cuidador">Cuidador</option>
                              </select>

                              {u.role === 'cuidador' && (
                                <div className="mt-2 p-2 bg-yellow-50 rounded border border-yellow-200">
                                  <div className="text-xs font-bold mb-1">Notificar a:</div>
                                  <div className="flex flex-col gap-1">
                                    {users.filter(t => t.id !== u.id && t.role !== 'cuidador').map(target => (
                                      <label key={target.id} className="flex items-center gap-1 text-xs">
                                        <input
                                          type="checkbox"
                                          checked={(u.caregiverTargets || []).includes(target.id)}
                                          onChange={(e) => {
                                            let current = u.caregiverTargets || [];
                                            if (e.target.checked) {
                                              if (current.length >= 3) { alert('Máximo 3 destinatarios'); return; }
                                              current = [...current, target.id];
                                            } else {
                                              current = current.filter(id => id !== target.id);
                                            }
                                            const updated = users.map(user =>
                                              user.id === u.id ? { ...user, caregiverTargets: current } : user
                                            );
                                            setUsers(updated);
                                            saveData('users', updated);
                                          }}
                                        />
                                        {target.id}
                                      </label>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </td>
                            <td className="p-3">
                              <div className="flex flex-wrap gap-2 text-xs">
                                {['menus', 'appointments', 'shopping', 'messages'].map(perm => (
                                  <label key={perm} className="flex items-center gap-1 cursor-pointer bg-gray-100 px-2 py-1 rounded hover:bg-gray-200">
                                    <input
                                      type="checkbox"
                                      checked={u.permissions?.[perm] ?? true}
                                      onChange={(e) => {
                                        const newPerms = { ...(u.permissions || { menus: true, appointments: true, shopping: true, messages: true }), [perm]: e.target.checked };
                                        const updated = users.map(user =>
                                          user.id === u.id ? { ...user, permissions: newPerms } : user
                                        );
                                        setUsers(updated);
                                        saveData('users', updated);
                                      }}
                                    />
                                    {perm === 'menus' ? 'Menús' : perm === 'appointments' ? 'Citas' : perm === 'shopping' ? 'Compra' : 'Msjes'}
                                  </label>
                                ))}
                              </div>
                            </td>
                            <td className="p-3">
                              <button
                                onClick={() => {
                                  const newPw = prompt('Nueva contraseña para ' + u.id, u.password);
                                  if (newPw) {
                                    const updated = users.map(user => user.id === u.id ? { ...user, password: newPw } : user);
                                    setUsers(updated);
                                    saveData('users', updated);
                                  }
                                }}
                                className="text-blue-600 mr-2 text-sm block"
                              >
                                Clave
                              </button>
                              <button
                                onClick={() => {
                                  const newEmail = prompt('Email para ' + u.id, u.email);
